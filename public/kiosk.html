<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XinWuChan Kiosk V2</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.6.7/axios.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"/>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0fdf4; user-select: none; touch-action: manipulation; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid rgba(255,255,255,0.5); }
        .btn-touch { transition: transform 0.1s; }
        .btn-touch:active { transform: scale(0.95); }
        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- CẤU HÌNH DỮ LIỆU ---
        const SERVICE_MENU = [
            { id: 'FT', name: 'Massage Chân (Foot)', icon: '👣', types: [
                { name: 'Chân 40 phút', time: 40, price: 500, type: 'CHAIR' },
                { name: 'Chân 70 phút', time: 70, price: 900, type: 'CHAIR' },
                { name: 'Chân 90 phút', time: 90, price: 999, type: 'CHAIR' },
            ]},
            { id: 'BD', name: 'Massage Body', icon: '🛏️', types: [
                { name: 'Body 70 phút', time: 70, price: 900, type: 'BED' },
                { name: 'Body 90 phút', time: 90, price: 999, type: 'BED' },
                { name: 'Body 120 phút', time: 120, price: 1500, type: 'BED' },
            ]},
            { id: 'CB', name: 'Combo (Chân+Body)', icon: '🔥', types: [
                { name: 'Combo 100 phút', time: 100, price: 999, type: 'BED' },
                { name: 'Combo 130 phút', time: 130, price: 1500, type: 'BED' },
            ]}
        ];

        const STAFF_PREF = [
            { id: 'ANY', name: 'Ngẫu nhiên (Nhanh nhất)', icon: '⚡' },
            { id: 'FEMALE', name: 'Nữ', icon: '👩' },
            { id: 'MALE', name: 'Nam', icon: '👨' },
            { id: 'OIL', name: 'Nữ (Đẩy dầu +$200)', icon: '💧' }
        ];

        // --- UTILS ---
        const getCurrentTimeMins = () => { const d = new Date(); return d.getHours() * 60 + d.getMinutes(); };
        const formatTime = (mins) => {
            let h = Math.floor(mins / 60);
            let m = mins % 60;
            if (h >= 24) h -= 24;
            return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;
        };

        const App = () => {
            const [mode, setMode] = useState('HOME'); // HOME, CHECKIN, BOOKING
            const [step, setStep] = useState(1);
            const [phone, setPhone] = useState('');
            const [apiData, setApiData] = useState({ bookings: [], staffList: [], resourceState: {}, resources: {} });
            const [myBooking, setMyBooking] = useState(null);
            
            // Booking State
            const [cart, setCart] = useState({ service: null, pax: 1, staffPref: 'ANY', foundSlot: null });
            const [isSearching, setIsSearching] = useState(false);

            // Fetch Data
            const fetchData = async () => {
                try {
                    const res = await axios.get('/api/info');
                    setApiData(res.data);
                } catch(e) { console.error(e); }
            };
            useEffect(() => { fetchData(); const t = setInterval(fetchData, 5000); return () => clearInterval(t); }, []);

            // --- LOGIC 1: CHECK-IN ---
            const handleFindBooking = () => {
                const today = new Date().toISOString().split('T')[0].replace(/-/g,'/'); // Simplistic date match
                // Lọc đơn hàng theo SĐT (tìm 4 số cuối hoặc full)
                const found = apiData.bookings.find(b => {
                    const cleanPhone = b.sdt.replace(/[^0-9]/g, '');
                    return cleanPhone.endsWith(phone) && !b.status.includes('取消') && !b.status.includes('完成');
                });

                if (found) {
                    setMyBooking(found);
                    setStep(2);
                } else {
                    alert('Không tìm thấy đơn đặt lịch nào với số điện thoại này hôm nay!');
                }
            };

            const handleConfirmCheckIn = async () => {
                if (!myBooking) return;
                try {
                    await axios.post('/api/update-status', { rowId: myBooking.rowId, status: '👋 Khách đã đến' });
                    alert(`Check-in thành công! Mời quý khách ngồi chờ.`);
                    window.location.reload();
                } catch(e) { alert('Lỗi hệ thống'); }
            };

            // --- LOGIC 2: SMART SEARCH (TÌM GIỜ SỚM NHẤT) ---
            const findEarliestSlot = () => {
                setIsSearching(true);
                setTimeout(() => {
                    // 1. Xác định thời gian bắt đầu tìm (Hiện tại làm tròn lên 10p)
                    const nowMins = getCurrentTimeMins();
                    let startSearchMins = Math.ceil(nowMins / 10) * 10 + 10; // +10p để khách kịp chuẩn bị
                    
                    // 2. Lấy thông tin tài nguyên
                    const totalChairs = 6;
                    const totalBeds = 6;
                    const duration = cart.service.time;
                    const reqType = cart.service.type; // CHAIR or BED
                    const reqPax = cart.pax;

                    // 3. Quét từng khung giờ (từ startSearchMins -> 26h đêm)
                    let foundTime = null;
                    
                    // Giả lập quét 12 khung giờ tiếp theo (2 tiếng tới)
                    // *Lưu ý: Logic này ở Client chỉ mang tính chất tương đối dựa trên dữ liệu đã tải*
                    for (let t = startSearchMins; t < 26*60; t += 15) {
                        // Tính số ghế/giường đang bận tại thời điểm t
                        let busyChairs = 0;
                        let busyBeds = 0;
                        let busyStaff = 0;

                        // Check Realtime Resources (Đang nằm trên giường)
                        Object.values(apiData.resourceState).forEach(res => {
                            if (res.isRunning && !res.isPaused) {
                                if (res.booking.type === 'CHAIR') busyChairs++;
                                if (res.booking.type === 'BED') busyBeds++;
                                busyStaff++;
                            }
                        });

                        // Check Future Bookings (Đã đặt trong sheet)
                        apiData.bookings.forEach(b => {
                            if (b.status.includes('取消')) return;
                            const bStartH = parseInt(b.startTimeString.split(' ')[1].split(':')[0]);
                            const bStartM = parseInt(b.startTimeString.split(' ')[1].split(':')[1]);
                            let bStartTotal = (bStartH < 8 ? bStartH + 24 : bStartH) * 60 + bStartM;
                            let bEndTotal = bStartTotal + b.duration;

                            // Nếu khung giờ t nằm trong khoảng bận của đơn hàng này
                            if (t >= bStartTotal && t < bEndTotal) {
                                if (b.type === 'CHAIR') busyChairs += b.pax;
                                if (b.type === 'BED') busyBeds += b.pax;
                                busyStaff += b.pax;
                            }
                        });

                        // Kiểm tra tính khả dụng
                        const totalStaff = apiData.staffList.length; // Tổng thợ (Giả định đơn giản)
                        // Lọc thợ theo giới tính nếu cần
                        let availableStaffCount = totalStaff - busyStaff; // Logic đơn giản hóa

                        let resourcesOk = false;
                        if (reqType === 'CHAIR') resourcesOk = (busyChairs + reqPax) <= totalChairs;
                        else resourcesOk = (busyBeds + reqPax) <= totalBeds;

                        if (resourcesOk && availableStaffCount >= reqPax) {
                            foundTime = t;
                            break; // Tìm thấy giờ sớm nhất!
                        }
                    }

                    if (foundTime) {
                        setCart({ ...cart, foundSlot: formatTime(foundTime) });
                        setStep(4); // Move to confirm
                    } else {
                        alert('Rất tiếc, hiện tại đã kín lịch trong 2 giờ tới!');
                        setStep(1);
                    }
                    setIsSearching(false);
                }, 1500); // Fake delay loading effect
            };

            const handleCreateWalkIn = async () => {
                const now = new Date();
                const todayStr = `${now.getFullYear()}/${(now.getMonth()+1).toString().padStart(2,'0')}/${now.getDate().toString().padStart(2,'0')}`;
                
                const payload = {
                    hoTen: `Khách lẻ (${phone})`,
                    sdt: phone,
                    dichVu: cart.service.name,
                    pax: cart.pax,
                    nhanVien: cart.staffPref === 'ANY' ? '隨機' : (cart.staffPref === 'OIL' ? 'Nữ (Dầu)' : cart.staffPref),
                    ngayDen: todayStr,
                    gioDen: cart.foundSlot,
                    isOil: cart.staffPref === 'OIL',
                    trangThai: 'đã check-in' // Đánh dấu luôn
                };

                try {
                    await axios.post('/api/admin-booking', payload);
                    setStep(5); // Success Screen
                    setTimeout(() => window.location.reload(), 5000);
                } catch(e) { alert('Lỗi kết nối!'); }
            };

            // --- UI COMPONENTS ---
            const Numpad = ({ value, onChange, onEnter }) => (
                <div className="grid grid-cols-3 gap-3 max-w-xs mx-auto">
                    {[1,2,3,4,5,6,7,8,9].map(n => <button key={n} onClick={() => onChange(value + n)} className="py-4 bg-white rounded-xl shadow text-2xl font-bold text-slate-700 active:bg-slate-200 btn-touch">{n}</button>)}
                    <button onClick={() => onChange(value.slice(0, -1))} className="py-4 bg-red-50 text-red-500 rounded-xl font-bold shadow btn-touch">⌫</button>
                    <button onClick={() => onChange(value + '0')} className="py-4 bg-white rounded-xl shadow text-2xl font-bold text-slate-700 active:bg-slate-200 btn-touch">0</button>
                    <button onClick={onEnter} className="py-4 bg-green-500 text-white rounded-xl font-bold shadow text-xl btn-touch">OK</button>
                </div>
            );

            // --- MAIN RENDER ---
            if (mode === 'HOME') return (
                <div className="h-screen flex flex-col items-center justify-center bg-[url('https://images.unsplash.com/photo-1544161515-4ab6ce6db874?q=80&w=2070&auto=format&fit=crop')] bg-cover">
                    <div className="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>
                    <div className="z-10 text-center space-y-8 animate__animated animate__fadeIn">
                        <h1 className="text-6xl font-black text-white drop-shadow-lg mb-8">XinWuChan Massage</h1>
                        <div className="flex gap-8">
                            <button onClick={() => setMode('CHECKIN')} className="w-64 h-64 glass flex flex-col items-center justify-center gap-4 text-emerald-800 hover:bg-white/90 btn-touch">
                                <span className="text-6xl">📅</span>
                                <span className="text-2xl font-bold">Đã Đặt Lịch<br/><span className="text-sm font-normal">(Check-in)</span></span>
                            </button>
                            <button onClick={() => setMode('BOOKING')} className="w-64 h-64 glass flex flex-col items-center justify-center gap-4 text-purple-800 hover:bg-white/90 btn-touch">
                                <span className="text-6xl">⚡</span>
                                <span className="text-2xl font-bold">Khách Mới<br/><span className="text-sm font-normal">(Đặt ngay)</span></span>
                            </button>
                        </div>
                    </div>
                </div>
            );

            if (mode === 'CHECKIN') return (
                <div className="h-screen flex flex-col items-center justify-center p-4">
                    <button onClick={() => setMode('HOME')} className="absolute top-8 left-8 p-3 bg-white rounded-full shadow">🏠 Trang chủ</button>
                    
                    {step === 1 && (
                        <div className="glass p-8 w-full max-w-lg text-center animate__animated animate__fadeInUp">
                            <h2 className="text-2xl font-bold mb-4">Nhập số điện thoại đặt lịch</h2>
                            <div className="text-4xl font-mono font-bold tracking-widest bg-white p-4 rounded-xl mb-6 border-2 border-emerald-200 min-h-[80px] flex items-center justify-center">{phone || "_ _ _ _"}</div>
                            <Numpad value={phone} onChange={setPhone} onEnter={handleFindBooking} />
                        </div>
                    )}

                    {step === 2 && myBooking && (
                        <div className="glass p-8 w-full max-w-lg text-center animate__animated animate__fadeIn">
                            <h2 className="text-2xl font-bold text-emerald-700 mb-2">Xin chào, {myBooking.customerName.split('(')[0]}!</h2>
                            <div className="bg-white p-6 rounded-xl shadow-inner mb-6 text-left space-y-3">
                                <div className="flex justify-between border-b pb-2"><span>Dịch vụ:</span> <span className="font-bold">{myBooking.serviceName}</span></div>
                                <div className="flex justify-between border-b pb-2"><span>Giờ đặt:</span> <span className="font-bold text-xl text-blue-600">{myBooking.startTimeString.split(' ')[1]}</span></div>
                                <div className="flex justify-between"><span>Nhân viên:</span> <span className="font-bold">{myBooking.staffId}</span></div>
                            </div>
                            <button onClick={handleConfirmCheckIn} className="w-full py-4 bg-emerald-600 text-white rounded-xl font-bold text-xl shadow-lg btn-touch">✅ Tôi đã đến (Check-in)</button>
                        </div>
                    )}
                </div>
            );

            if (mode === 'BOOKING') return (
                <div className="h-screen flex flex-col bg-slate-50">
                    <div className="bg-white p-4 shadow-sm flex justify-between items-center">
                        <button onClick={() => setMode('HOME')} className="px-4 py-2 bg-slate-100 rounded-lg font-bold">🏠</button>
                        <h2 className="font-bold text-lg text-slate-700">Đặt Lịch Nhanh (Walk-in)</h2>
                        <div className="w-10"></div>
                    </div>

                    <div className="flex-1 overflow-y-auto p-4 pb-24">
                        {step === 1 && (
                            <div className="space-y-6 animate__animated animate__slideInRight">
                                <h3 className="text-xl font-bold text-slate-600">1. Chọn Dịch Vụ</h3>
                                {SERVICE_MENU.map(cat => (
                                    <div key={cat.id}>
                                        <div className="text-sm font-bold text-gray-400 mb-2 uppercase">{cat.name}</div>
                                        <div className="grid grid-cols-1 gap-3">
                                            {cat.types.map((svc, i) => (
                                                <button key={i} onClick={() => { setCart({...cart, service: svc}); setStep(2); }} className="bg-white p-4 rounded-xl shadow-sm flex justify-between items-center btn-touch border-l-4 border-indigo-500">
                                                    <span className="font-bold text-lg">{svc.name}</span>
                                                    <span className="font-black text-amber-500 text-xl">${svc.price}</span>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {step === 2 && (
                            <div className="space-y-6 animate__animated animate__slideInRight">
                                <h3 className="text-xl font-bold text-slate-600">2. Số lượng khách</h3>
                                <div className="grid grid-cols-2 gap-4">
                                    {[1,2,3,4,5,6].map(n => (
                                        <button key={n} onClick={() => { setCart({...cart, pax: n}); setStep(3); }} className="py-8 bg-white rounded-xl shadow-sm text-4xl font-bold text-indigo-600 btn-touch border-2 border-transparent focus:border-indigo-500">
                                            {n} <span className="text-sm text-gray-400">Người</span>
                                        </button>
                                    ))}
                                </div>
                                <button onClick={() => setStep(1)} className="w-full py-3 text-gray-400 mt-4">Quay lại</button>
                            </div>
                        )}

                        {step === 3 && (
                            <div className="space-y-6 animate__animated animate__slideInRight">
                                <h3 className="text-xl font-bold text-slate-600">3. Chọn Nhân Viên</h3>
                                <div className="grid grid-cols-1 gap-4">
                                    {STAFF_PREF.map(pref => (
                                        <button key={pref.id} onClick={() => { setCart({...cart, staffPref: pref.id}); findEarliestSlot(); }} className="bg-white p-6 rounded-xl shadow-sm flex items-center gap-4 btn-touch">
                                            <span className="text-4xl">{pref.icon}</span>
                                            <span className="font-bold text-xl">{pref.name}</span>
                                        </button>
                                    ))}
                                </div>
                                <button onClick={() => setStep(2)} className="w-full py-3 text-gray-400 mt-4">Quay lại</button>
                            </div>
                        )}

                        {isSearching && (
                            <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center backdrop-blur-sm">
                                <div className="bg-white p-8 rounded-2xl flex flex-col items-center animate__animated animate__pulse animate__infinite">
                                    <div className="text-6xl mb-4">🔍</div>
                                    <div className="text-xl font-bold">Đang tìm giờ trống sớm nhất...</div>
                                </div>
                            </div>
                        )}

                        {step === 4 && (
                            <div className="animate__animated animate__fadeIn">
                                <div className="glass p-6 text-center mb-6 border-2 border-emerald-400 bg-emerald-50">
                                    <div className="text-sm text-emerald-600 font-bold uppercase mb-2">Tìm thấy giờ trống!</div>
                                    <div className="text-6xl font-black text-emerald-700 mb-2">{cart.foundSlot}</div>
                                    <div className="text-gray-500">Hôm nay</div>
                                </div>
                                
                                <div className="bg-white p-4 rounded-xl shadow-sm mb-6 space-y-2">
                                    <div className="flex justify-between"><span>Dịch vụ:</span> <b>{cart.service.name}</b></div>
                                    <div className="flex justify-between"><span>Số khách:</span> <b>{cart.pax}</b></div>
                                    <div className="flex justify-between"><span>Yêu cầu:</span> <b>{STAFF_PREF.find(p=>p.id===cart.staffPref).name}</b></div>
                                </div>

                                <h3 className="font-bold mb-2">Nhập SĐT để chốt đơn:</h3>
                                <div className="text-3xl font-mono text-center bg-white p-3 rounded-lg border mb-4 tracking-widest">{phone || "..."}</div>
                                <Numpad value={phone} onChange={setPhone} onEnter={handleCreateWalkIn} />
                                <button onClick={() => setStep(3)} className="w-full py-3 text-gray-400 mt-4">Chọn lại</button>
                            </div>
                        )}

                        {step === 5 && (
                            <div className="h-full flex flex-col items-center justify-center text-emerald-600">
                                <div className="text-8xl mb-4 animate__animated animate__bounceIn">🎉</div>
                                <h2 className="text-3xl font-bold">Đặt lịch thành công!</h2>
                                <p className="mt-2 text-slate-500">Vui lòng đợi nhân viên sắp xếp.</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
