<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kiosk Check-in - XinWuChan</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.6.7/axios.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet"/>

    <style>
        body { font-family: 'Microsoft JhengHei', sans-serif; background-color: #f3f4f6; user-select: none; -webkit-touch-callout: none; overflow: hidden; }
        .kiosk-btn { transition: all 0.2s; active: scale(0.95); }
        .kiosk-btn:active { transform: scale(0.95); }
        /* Hide Scrollbar */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Cấu hình dịch vụ giống Server để hiển thị
        const MENU_CATEGORIES = [
            { id: 'COMBO', name: '🔥 套餐 (Combo)', color: 'from-purple-500 to-indigo-600' },
            { id: 'FOOT', name: '👣 足底按摩 (Foot)', color: 'from-emerald-400 to-teal-600' },
            { id: 'BODY', name: '🛏️ 身體指壓 (Body)', color: 'from-orange-400 to-red-500' }
        ];

        const SERVICES_DATA = {
            'COMBO': [
                { name: '👑 帝王套餐 (190分)', price: 2000 },
                { name: '💎 豪華套餐 (130分)', price: 1500 },
                { name: '🔥 招牌套餐 (100分)', price: 999 },
                { name: '⚡ 精選套餐 (70分)', price: 900 }
            ],
            'FOOT': [
                { name: '👣 足底按摩 (120分)', price: 1500 },
                { name: '👣 足底按摩 (90分)', price: 999 },
                { name: '👣 足底按摩 (70分)', price: 900 },
                { name: '👣 足底按摩 (40分)', price: 500 }
            ],
            'BODY': [
                { name: '🛏️ 全身指壓 (120分)', price: 1500 },
                { name: '🛏️ 全身指壓 (90分)', price: 999 },
                { name: '🛏️ 全身指壓 (70分)', price: 900 },
                { name: '🛏️ 半身指壓 (35分)', price: 500 }
            ]
        };

        const App = () => {
            const [step, setStep] = useState(0); // 0:Welcome, 1:Cat, 2:Svc, 3:Oil, 4:Staff, 5:Info, 6:Success
            const [booking, setBooking] = useState({ category: '', service: '', price: 0, isOil: false, staff: '隨機', name: '', phone: '' });
            const [staffList, setStaffList] = useState([]);
            const [staffStatus, setStaffStatus] = useState({});
            
            // Tải dữ liệu thợ từ Server
            useEffect(() => {
                const fetchStaff = async () => {
                    try {
                        const res = await axios.get('/api/info');
                        setStaffList(res.data.staffList || []);
                        setStaffStatus(res.data.staffStatus || {});
                    } catch (e) { console.error("API Error", e); }
                };
                fetchStaff();
                // Refresh data mỗi lần quay lại bước chọn thợ
                if (step === 4) fetchStaff();
            }, [step]);

            const handleReset = () => { setStep(0); setBooking({ category: '', service: '', price: 0, isOil: false, staff: '隨機', name: '', phone: '' }); };

            const handleSubmit = async () => {
                const now = new Date();
                const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
                const dateStr = `${now.getFullYear()}/${(now.getMonth()+1).toString().padStart(2,'0')}/${now.getDate().toString().padStart(2,'0')}`;
                
                const payload = {
                    hoTen: booking.name || '現場客(Kiosk)',
                    sdt: booking.phone,
                    dichVu: booking.service,
                    pax: 1, // Kiosk mặc định 1 người
                    nhanVien: booking.staff,
                    ngayDen: dateStr,
                    gioDen: timeStr,
                    isOil: booking.isOil,
                    trangThai: '已預約'
                };

                try {
                    await axios.post('/api/admin-booking', payload);
                    setStep(6);
                    setTimeout(handleReset, 5000); // 5s tự reset về trang chủ
                } catch (e) {
                    alert('Lỗi kết nối Server!');
                }
            };

            // --- COMPONENTS ---

            // STEP 0: WELCOME
            if (step === 0) return (
                <div className="h-screen w-full bg-gradient-to-br from-indigo-900 to-purple-900 flex flex-col items-center justify-center text-white relative overflow-hidden" onClick={() => setStep(1)}>
                    <div className="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1600334089648-b0d9d3028eb2?q=80&w=2070&auto=format&fit=crop')] bg-cover bg-center opacity-20"></div>
                    <div className="z-10 text-center animate__animated animate__fadeInUp">
                        <h1 className="text-6xl font-black mb-4 tracking-wider">XinWuChan Massage</h1>
                        <p className="text-2xl font-light mb-12">歡迎光臨 Welcome</p>
                        <button className="px-12 py-4 bg-amber-400 text-indigo-900 text-3xl font-bold rounded-full shadow-[0_0_30px_rgba(251,191,36,0.6)] animate-pulse">
                            點擊開始 (Start)
                        </button>
                    </div>
                </div>
            );

            // STEP 1: CATEGORY
            if (step === 1) return (
                <div className="h-screen bg-slate-100 p-8 flex flex-col">
                    <h2 className="text-3xl font-bold text-center text-slate-700 mb-8">請選擇服務類別 (Category)</h2>
                    <div className="grid grid-cols-1 gap-6 flex-1">
                        {MENU_CATEGORIES.map(cat => (
                            <button key={cat.id} onClick={() => { setBooking({...booking, category: cat.id}); setStep(2); }} 
                                className={`kiosk-btn h-full rounded-3xl shadow-xl bg-gradient-to-r ${cat.color} text-white text-4xl font-bold flex items-center justify-center`}>
                                {cat.name}
                            </button>
                        ))}
                    </div>
                    <button onClick={handleReset} className="mt-6 py-4 bg-gray-300 text-gray-600 rounded-xl font-bold text-xl">回首頁 (Back)</button>
                </div>
            );

            // STEP 2: SERVICE LIST
            if (step === 2) return (
                <div className="h-screen bg-slate-100 p-8 flex flex-col">
                    <h2 className="text-3xl font-bold text-center text-slate-700 mb-8">請選擇服務項目 (Service)</h2>
                    <div className="grid grid-cols-2 gap-6 flex-1 overflow-y-auto pb-4">
                        {SERVICES_DATA[booking.category].map((svc, idx) => (
                            <button key={idx} onClick={() => { 
                                setBooking({...booking, service: svc.name, price: svc.price}); 
                                // Nếu là Body hoặc Combo -> Hỏi Dầu. Nếu Foot -> Chọn Thợ luôn
                                if(booking.category === 'FOOT') setStep(4); else setStep(3); 
                            }} 
                                className="kiosk-btn bg-white rounded-2xl shadow-lg border-2 border-slate-200 p-6 flex flex-col items-center justify-center gap-2">
                                <span className="text-2xl font-bold text-slate-800 text-center">{svc.name}</span>
                                <span className="text-3xl font-black text-amber-500">${svc.price}</span>
                            </button>
                        ))}
                    </div>
                    <button onClick={() => setStep(1)} className="mt-4 py-4 bg-gray-300 text-gray-600 rounded-xl font-bold text-xl">上一步 (Back)</button>
                </div>
            );

            // STEP 3: OIL OPTION
            if (step === 3) return (
                <div className="h-screen bg-slate-100 p-8 flex flex-col">
                    <h2 className="text-3xl font-bold text-center text-slate-700 mb-12">是否需要精油油推? (Oil Massage?)</h2>
                    <div className="grid grid-cols-2 gap-8 flex-1 max-h-[400px]">
                        <button onClick={() => { setBooking({...booking, isOil: true}); setStep(4); }} className="kiosk-btn bg-purple-100 border-4 border-purple-500 rounded-3xl flex flex-col items-center justify-center gap-4">
                            <span className="text-6xl">💧</span>
                            <span className="text-3xl font-bold text-purple-700">需要 (Yes)</span>
                            <span className="text-xl text-purple-600">+$200 (指定女師傅)</span>
                        </button>
                        <button onClick={() => { setBooking({...booking, isOil: false}); setStep(4); }} className="kiosk-btn bg-slate-200 border-4 border-slate-400 rounded-3xl flex flex-col items-center justify-center gap-4">
                            <span className="text-6xl">🙅</span>
                            <span className="text-3xl font-bold text-slate-700">不需要 (No)</span>
                        </button>
                    </div>
                    <button onClick={() => setStep(2)} className="mt-auto py-4 bg-gray-300 text-gray-600 rounded-xl font-bold text-xl">上一步 (Back)</button>
                </div>
            );

            // STEP 4: STAFF SELECTION
            if (step === 4) {
                // Filter Logic:
                // 1. Nếu Oil = True -> Chỉ lấy Nữ
                // 2. Chỉ lấy những người có status != BUSY, AWAY, OUT_SHORT (dựa trên staffStatus từ server)
                // 3. Luôn luôn có nút "Ngẫu nhiên"
                
                let availableStaff = staffList.filter(s => {
                    const status = staffStatus[s.id]?.status;
                    if (status === 'BUSY' || status === 'AWAY' || status === 'OUT_SHORT') return false; // Thợ bận
                    if (booking.isOil && (s.gender !== 'F' && s.gender !== '女')) return false; // Khách dầu cần nữ
                    return true;
                });

                // Sắp xếp theo checkInTime (ai đợi lâu nhất lên đầu - Logic tua)
                availableStaff.sort((a, b) => (staffStatus[a.id]?.checkInTime || 0) - (staffStatus[b.id]?.checkInTime || 0));

                return (
                    <div className="h-screen bg-slate-100 p-6 flex flex-col">
                        <h2 className="text-2xl font-bold text-center text-slate-700 mb-4">請選擇師傅 (Select Staff)</h2>
                        <div className="flex-1 overflow-y-auto">
                            <div className="grid grid-cols-4 gap-4">
                                {/* Random Button */}
                                <button onClick={() => { setBooking({...booking, staff: '隨機'}); setStep(5); }} 
                                    className="aspect-square bg-gradient-to-br from-amber-400 to-orange-500 rounded-2xl shadow-lg flex flex-col items-center justify-center text-white kiosk-btn">
                                    <span className="text-4xl">🎲</span>
                                    <span className="text-xl font-bold mt-2">隨機 (Random)</span>
                                </button>
                                
                                {availableStaff.map(s => (
                                    <button key={s.id} onClick={() => { setBooking({...booking, staff: s.id}); setStep(5); }} 
                                        className={`aspect-square rounded-2xl shadow-lg flex flex-col items-center justify-center border-b-8 kiosk-btn bg-white ${s.gender === 'F' || s.gender === '女' ? 'border-pink-400 text-pink-600' : 'border-blue-400 text-blue-600'}`}>
                                        <span className="text-3xl font-black">{s.id.replace('號','')}</span>
                                        <span className="text-lg font-bold mt-1">{s.name}</span>
                                    </button>
                                ))}
                            </div>
                            {availableStaff.length === 0 && <div className="text-center text-gray-500 mt-10 text-xl">沒有空閒技師 (No staff available)</div>}
                        </div>
                        <button onClick={() => setStep(booking.category==='FOOT' ? 2 : 3)} className="mt-4 py-4 bg-gray-300 text-gray-600 rounded-xl font-bold text-xl">上一步 (Back)</button>
                    </div>
                );
            }

            // STEP 5: INFO (NUMPAD)
            if (step === 5) {
                const addNum = (n) => { if(booking.phone.length < 10) setBooking({...booking, phone: booking.phone + n}); };
                const delNum = () => { setBooking({...booking, phone: booking.phone.slice(0, -1)}); };
                
                return (
                    <div className="h-screen bg-slate-100 p-6 flex flex-col">
                        <h2 className="text-2xl font-bold text-center text-slate-700 mb-2">請輸入手機號碼 (Phone Number)</h2>
                        
                        {/* Display */}
                        <div className="bg-white p-4 rounded-xl shadow-inner mb-4 flex justify-between items-center border-2 border-indigo-100">
                            <span className={`text-4xl font-mono font-bold tracking-widest ${booking.phone ? 'text-indigo-900' : 'text-gray-300'}`}>
                                {booking.phone || "09xx..."}
                            </span>
                            {booking.phone && <button onClick={() => setBooking({...booking, phone: ''})} className="text-gray-400 font-bold px-4">CLEAR</button>}
                        </div>

                        {/* Numpad */}
                        <div className="flex-1 grid grid-cols-3 gap-3">
                            {[1,2,3,4,5,6,7,8,9].map(n => (
                                <button key={n} onClick={() => addNum(n)} className="bg-white rounded-xl shadow-sm text-3xl font-bold text-slate-700 active:bg-slate-200">{n}</button>
                            ))}
                            <button onClick={() => setStep(4)} className="bg-red-100 rounded-xl shadow-sm text-xl font-bold text-red-600">Back</button>
                            <button onClick={() => addNum(0)} className="bg-white rounded-xl shadow-sm text-3xl font-bold text-slate-700 active:bg-slate-200">0</button>
                            <button onClick={delNum} className="bg-orange-100 rounded-xl shadow-sm text-xl font-bold text-orange-600">⌫</button>
                        </div>

                        <button onClick={handleSubmit} disabled={booking.phone.length < 4} 
                            className={`mt-4 py-5 rounded-2xl text-2xl font-bold text-white shadow-lg transition-all ${booking.phone.length > 3 ? 'bg-indigo-600 hover:bg-indigo-700' : 'bg-gray-400'}`}>
                            確認預約 (Confirm)
                        </button>
                    </div>
                );
            }

            // STEP 6: SUCCESS
            if (step === 6) return (
                <div className="h-screen bg-emerald-500 flex flex-col items-center justify-center text-white p-8">
                    <div className="w-32 h-32 bg-white rounded-full flex items-center justify-center mb-6 animate__animated animate__bounceIn">
                        <span className="text-6xl">✅</span>
                    </div>
                    <h2 className="text-5xl font-bold mb-4">預約成功!</h2>
                    <p className="text-2xl opacity-90 mb-8">Success! Please wait.</p>
                    <div className="glass-panel p-6 rounded-2xl w-full max-w-md text-emerald-900 text-left space-y-2">
                        <div className="flex justify-between text-xl"><span>項目:</span> <span className="font-bold">{booking.service}</span></div>
                        <div className="flex justify-between text-xl"><span>師傅:</span> <span className="font-bold">{booking.staff}</span></div>
                        {booking.isOil && <div className="flex justify-between text-xl text-purple-700 font-bold"><span>+ 精油:</span> <span>Yes</span></div>}
                        <div className="flex justify-between text-2xl border-t border-emerald-900/20 pt-2 mt-2"><span>電話:</span> <span className="font-mono font-bold">{booking.phone}</span></div>
                    </div>
                    <p className="mt-8 text-lg animate-pulse">系統將自動返回首頁...</p>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
