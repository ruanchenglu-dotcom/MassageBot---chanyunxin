<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Massage POS - Ultimate Manager</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.6.7/axios.min.js"></script>

    <style>
        body { font-family: 'Microsoft JhengHei', sans-serif; background-color: #f1f5f9; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .modal-animate { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* 3D CARDS */
        .card-3d { transition: all 0.1s; position: relative; top: 0; }
        .card-3d:active { transform: translateY(4px); border-bottom-width: 0px; margin-bottom: 4px; }
        
        .style-male { background: white; border: 2px solid #3B82F6; border-bottom: 5px solid #2563EB; color: #1E3A8A; }
        .style-female { background: white; border: 2px solid #F472B6; border-bottom: 5px solid #DB2777; color: #BE185D; }
        
        /* Status Colors */
        .st-busy { background: #FEF2F2; border-color: #EF4444; border-bottom-color: #B91C1C; color: #B91C1C; }
        .st-booked { background: #FFFBEB; border-color: #F59E0B; border-bottom-color: #B45309; color: #B45309; }
        .st-away { background: #F3F4F6; border-color: #9CA3AF; border-bottom-color: #6B7280; color: #9CA3AF; opacity: 0.6; }
        .badge-queue { background: #10B981; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }

        /* Timeline Grid */
        .timeline-bg { background-image: linear-gradient(to right, #f0f0f0 1px, transparent 1px); background-size: 4.16% 100%; } /* 24h/100% */
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- ICONS ---
        const Icon = ({ d, size=20, className="" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d={d} /></svg>);
        const PATHS = {
            Users: "M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M9 7a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75",
            Grid: "M3 3h7v7H3zM14 3h7v7h-7zM14 14h7v7h-7zM3 14h7v7H3z",
            List: "M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01",
            Chart: "M12 20V10M18 20V4M6 20v-6",
            Dollar: "M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6",
            Settings: "M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.18-.08a2 2 0 0 0-2 0l-.45.45a2 2 0 0 0 0 2l.08.18a2 2 0 0 1 0 2l-.25.43a2 2 0 0 1-1.73 1H2a2 2 0 0 0-2 2v.44a2 2 0 0 0 2 2h.18a2 2 0 0 1 1.73 1l.25.43a2 2 0 0 1 0 2l-.08.18a2 2 0 0 0 0 2l.45.45a2 2 0 0 0 2 0l.18-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.18.08a2 2 0 0 0 2 0l.45-.45a2 2 0 0 0 0-2l-.08-.18a2 2 0 0 1 0-2l.25-.43a2 2 0 0 1 1.73-1H22a2 2 0 0 0 2-2v-.44a2 2 0 0 0-2-2h-.18a2 2 0 0 1-1.73-1l-.25-.43a2 2 0 0 1 0-2l.08-.18a2 2 0 0 0 0-2l.45-.45a2 2 0 0 0 2 0l.18.08a2 2 0 0 1-2 0l.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z",
            X: "M18 6 6 18M6 6l12 12",
            Check: "M20 6 9 17 4 12",
            Refresh: "M23 4v6h-6M1 20v-6h6"
        };

        // --- CONSTANTS ---
        const SERVICE_PRICES = {
            '帝王': 2000, '豪華': 1500, '招牌': 999, '精選': 900,
            '足底': 500, '全身': 1000, '半身': 500
        };

        // --- HELPERS ---
        const parseTime = (str) => {
            if(!str) return 0;
            const [h, m] = str.split(':').map(Number);
            return h * 60 + (m || 0);
        };
        const getPrice = (name) => {
            for(let k in SERVICE_PRICES) if(name.includes(k)) return SERVICE_PRICES[k];
            return 0;
        };

        // --- COMPONENTS ---

        // 1. TIMELINE COMPONENT
        const TimelineView = ({ bookings }) => {
            const hours = Array.from({length: 15}, (_, i) => i + 10); // 10:00 -> 24:00
            
            return (
                <div className="bg-white border rounded-xl overflow-hidden shadow-sm h-96 flex flex-col">
                    <div className="flex border-b bg-gray-50 h-10 shrink-0">
                        <div className="w-20 border-r p-2 font-bold text-xs text-gray-500 flex items-center justify-center">Resource</div>
                        <div className="flex-1 relative">
                            {hours.map((h, i) => (
                                <div key={h} className="absolute h-full border-l text-[10px] text-gray-400 pl-1" style={{left: `${(i/14)*100}%`}}>
                                    {h}:00
                                </div>
                            ))}
                        </div>
                    </div>
                    <div className="overflow-y-auto flex-1 relative timeline-bg">
                        {/* 6 GIƯỜNG */}
                        {Array.from({length: 6}, (_, i) => i+1).map(n => (
                            <div key={`bed-${n}`} className="h-12 border-b flex relative group">
                                <div className="w-20 border-r bg-gray-50 text-xs font-bold flex items-center justify-center text-purple-600">Bed {n}</div>
                                <div className="flex-1 relative">
                                    {bookings.filter(b => b.type === 'BED' && (b.id % 6) + 1 === n && b.status !== 'cancelled').map((b, idx) => {
                                        const start = parseTime(b.time.split(' ')[1] || b.time); // Giả sử b.time = "14:00"
                                        const left = ((start - 600) / 840) * 100; // 10:00 = 600min, total view 14h = 840min
                                        const width = (b.duration / 840) * 100;
                                        if (left < 0) return null;
                                        return (
                                            <div key={idx} className="absolute top-2 h-8 rounded bg-purple-500 text-white text-[10px] flex items-center px-2 shadow-sm overflow-hidden whitespace-nowrap z-10" 
                                                 style={{left: `${left}%`, width: `${width}%`}} title={b.customerName}>
                                                {b.customerName}
                                            </div>
                                        )
                                    })}
                                </div>
                            </div>
                        ))}
                        {/* 6 GHẾ */}
                        {Array.from({length: 6}, (_, i) => i+1).map(n => (
                            <div key={`chair-${n}`} className="h-12 border-b flex relative group">
                                <div className="w-20 border-r bg-gray-50 text-xs font-bold flex items-center justify-center text-emerald-600">Chair {n}</div>
                                <div className="flex-1 relative">
                                    {bookings.filter(b => b.type === 'CHAIR' && (b.id % 6) + 1 === n && b.status !== 'cancelled').map((b, idx) => {
                                        const start = parseTime(b.time.split(' ')[1] || b.time);
                                        const left = ((start - 600) / 840) * 100;
                                        const width = (b.duration / 840) * 100;
                                        if (left < 0) return null;
                                        return (
                                            <div key={idx} className="absolute top-2 h-8 rounded bg-emerald-500 text-white text-[10px] flex items-center px-2 shadow-sm overflow-hidden whitespace-nowrap z-10" 
                                                 style={{left: `${left}%`, width: `${width}%`}} title={b.customerName}>
                                                {b.customerName}
                                            </div>
                                        )
                                    })}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // 2. REVENUE TABLE
        const RevenueTable = ({ bookings }) => {
            const revenue = bookings.reduce((acc, b) => {
                if(b.status === 'cancelled') return acc;
                const p = getPrice(b.serviceName);
                const oil = b.serviceName.includes('油') ? 200 : 0;
                return acc + (p + oil) * (b.pax || 1);
            }, 0);

            return (
                <div className="bg-white p-6 rounded-xl shadow-sm border text-center">
                    <h3 className="text-gray-500 font-bold mb-2 uppercase tracking-wide">Tổng Doanh Thu Hôm Nay</h3>
                    <div className="text-4xl font-black text-emerald-600 flex justify-center items-center gap-2">
                        <Icon d={PATHS.Dollar} size={32}/> {revenue.toLocaleString()} TWD
                    </div>
                    <div className="mt-4 grid grid-cols-3 gap-4 text-sm">
                        <div className="bg-purple-50 p-2 rounded">
                            <div className="font-bold text-purple-700">{bookings.filter(b => b.status !== 'cancelled').length}</div>
                            <div className="text-gray-500">Đơn hàng</div>
                        </div>
                        <div className="bg-blue-50 p-2 rounded">
                            <div className="font-bold text-blue-700">{bookings.reduce((a,b) => b.status!=='cancelled' ? a + (b.pax||1) : a, 0)}</div>
                            <div className="text-gray-500">Khách</div>
                        </div>
                        <div className="bg-orange-50 p-2 rounded">
                            <div className="font-bold text-orange-700">{bookings.filter(b=> b.status==='cancelled').length}</div>
                            <div className="text-gray-500">Hủy</div>
                        </div>
                    </div>
                </div>
            );
        };

        // 3. STAFF CARD 3D (V5 Logic)
        const StaffCard3D = ({ s, statusData, queueIndex }) => {
            const isFemale = s.gender === 'F' || s.gender === '女';
            const local = statusData[s.id] || { status: 'AWAY' };
            let displayStatus = local.status;
            let statusClass = isFemale ? 'style-female' : 'style-male';
            let label = '---';

            if (s.activeBooking) {
                // Check time
                const now = new Date();
                try {
                    const [h, m] = s.activeBooking.time.split(':').map(Number); // Simplified time parsing
                    const bookTime = h * 60 + m;
                    const curTime = now.getHours() * 60 + now.getMinutes();
                    if(curTime >= bookTime) { displayStatus = 'BUSY'; statusClass = 'st-busy'; }
                    else { displayStatus = 'BOOKED'; statusClass = 'st-booked'; }
                } catch(e) { displayStatus = 'BOOKED'; statusClass = 'st-booked'; }
            } else if (displayStatus === 'AWAY') statusClass = 'st-away';

            // Custom Status Colors
            if(displayStatus === 'EAT') { statusClass = 'bg-orange-100 border-orange-400 border-b-orange-600 text-orange-800'; label='Ăn cơm'; }
            else if(displayStatus === 'OUT_SHORT') { statusClass = 'bg-green-100 border-green-400 border-b-green-600 text-green-800'; label='Ra ngoài'; }
            else if(displayStatus === 'OUT_LONG') { statusClass = 'bg-blue-100 border-blue-400 border-b-blue-600 text-blue-800'; label='Ra lâu'; }
            else if(displayStatus === 'AWAY') label = 'Chưa đến';
            else if(displayStatus === 'READY') label = 'Sẵn sàng';
            else if(displayStatus === 'BUSY') label = 'Đang làm';
            else if(displayStatus === 'BOOKED') label = 'Khách đặt';

            return (
                <div className={`card-3d w-24 h-32 rounded-xl flex flex-col justify-between cursor-pointer select-none ${statusClass}`}>
                    {displayStatus === 'READY' && queueIndex !== undefined && (
                        <div className="absolute -top-3 -right-3 w-7 h-7 badge-queue text-white rounded-full flex items-center justify-center font-black text-sm border-2 border-white z-10">{queueIndex + 1}</div>
                    )}
                    <div className="flex-1 flex flex-col items-center justify-center p-2">
                        <div className="text-3xl font-black">{s.id.replace('號','')}</div>
                        <div className="text-[10px] font-bold mt-1 opacity-80 truncate w-full text-center">{s.name}</div>
                    </div>
                    <div className="text-center text-[10px] font-bold py-1 w-full bg-black/5 rounded-b-lg">{label}</div>
                </div>
            )
        };

        // 4. CHECK-IN MODAL
        const CheckInBoard = ({ staffList, statusData, setStatusData, onClose }) => {
            const handleStatusChange = (id, newStatus) => {
                const now = Date.now();
                const current = statusData[id] || {};
                const newState = { ...statusData, [id]: { status: newStatus, checkInTime: newStatus === 'READY' && current.status !== 'READY' ? now : (current.checkInTime || 0) } };
                setStatusData(newState);
                localStorage.setItem('staff_status_final', JSON.stringify(newState));
            };
            return (
                <div className="fixed inset-0 bg-slate-900/80 z-[60] flex items-center justify-center p-4 backdrop-blur-sm">
                    <div className="bg-white w-full max-w-4xl rounded-2xl shadow-2xl modal-animate flex flex-col max-h-[90vh] overflow-hidden">
                        <div className="p-4 bg-purple-700 text-white flex justify-between items-center shrink-0">
                            <h2 className="text-xl font-bold flex gap-2 items-center"><Icon d={PATHS.Users}/> Check-in Manager</h2>
                            <button onClick={onClose}><Icon d={PATHS.X}/></button>
                        </div>
                        <div className="overflow-y-auto flex-1 p-4 space-y-2 bg-slate-100">
                            {staffList.filter(s=>s.status!=='off').map(s => (
                                <div key={s.id} className="flex justify-between items-center p-3 bg-white border rounded-lg shadow-sm">
                                    <div className="flex items-center gap-3 w-1/3">
                                        <div className="font-bold text-lg text-slate-700">{s.id}</div>
                                        <div className="font-bold text-slate-900">{s.name}</div>
                                    </div>
                                    <select value={(statusData[s.id]||{}).status || 'AWAY'} onChange={(e)=>handleStatusChange(s.id, e.target.value)} className="border-2 rounded px-3 py-1 font-bold text-sm outline-none focus:border-purple-500">
                                        <option value="AWAY">⚪ Chưa đến</option>
                                        <option value="READY">🟢 Sẵn sàng</option>
                                        <option value="EAT">🟠 Ăn cơm</option>
                                        <option value="OUT_SHORT">🔵 Ra ngoài</option>
                                    </select>
                                </div>
                            ))}
                        </div>
                        <div className="p-4 bg-white border-t flex justify-end"><button onClick={onClose} className="bg-purple-600 text-white px-6 py-2 rounded-lg font-bold">Xong</button></div>
                    </div>
                </div>
            );
        };

        // --- MAIN APP ---
        function App() {
            const [activeTab, setActiveTab] = useState('list'); // list, timeline, revenue
            const [staffList, setStaffList] = useState([]);
            const [bookings, setBookings] = useState([]);
            const [statusData, setStatusData] = useState(() => JSON.parse(localStorage.getItem('staff_status_final')) || {});
            const [showManager, setShowManager] = useState(false);

            const fetchData = async () => {
                try {
                    const res = await axios.get('/api/info');
                    const { bookings: apiBookings, staffList: apiStaff } = res.data;
                    const mappedBookings = apiBookings.map((b, i) => ({ ...b, id: i, status: (b.status && b.status.includes('取消')) ? 'cancelled' : 'active' }));
                    setBookings(mappedBookings);
                    
                    const mappedStaff = apiStaff.map(s => {
                        const activeBooking = mappedBookings.find(b => b.staffId === s.id && b.status === 'active');
                        return { ...s, activeBooking };
                    });
                    // Sort ID
                    mappedStaff.sort((a,b) => parseInt(a.id.replace(/\D/g,'')) - parseInt(b.id.replace(/\D/g,'')));
                    setStaffList(mappedStaff);
                } catch(e) { console.error(e); }
            };

            useEffect(() => { fetchData(); const t = setInterval(fetchData, 10000); return () => clearInterval(t); }, []);

            // SORTING LOGIC (Right to Left Priority)
            const workingStaff = staffList.filter(s => s.status !== 'off');
            const awayStaff = workingStaff.filter(s => !statusData[s.id] || statusData[s.id].status === 'AWAY');
            const activeStaff = workingStaff.filter(s => statusData[s.id] && statusData[s.id].status !== 'AWAY');
            activeStaff.sort((a, b) => (statusData[a.id]?.checkInTime || 0) - (statusData[b.id]?.checkInTime || 0));

            return (
                <div className="min-h-screen flex flex-col">
                    {/* HEADER */}
                    <header className="bg-slate-900 text-white p-3 shadow-xl flex justify-between items-center sticky top-0 z-50">
                        <div className="font-bold flex gap-3 items-center px-2 text-lg">
                            <span className="bg-amber-500 text-black px-2 rounded text-sm font-black">POS</span>
                            <span>XinWuChan</span>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={fetchData} className="p-2 bg-slate-800 rounded-full hover:bg-slate-700"><Icon d={PATHS.Refresh}/></button>
                            <button onClick={()=>setShowManager(true)} className="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-1.5 rounded-lg font-bold flex gap-2 items-center text-sm border-b-4 border-indigo-800 active:border-b-0 active:translate-y-1 transition-all"><Icon d={PATHS.Settings}/> Check-in</button>
                        </div>
                    </header>

                    {/* STAFF RAIL (Top) */}
                    <div className="bg-white border-b shadow-sm p-4 overflow-x-auto shrink-0">
                        <div className="flex items-center gap-6 min-w-max">
                            <div className="flex gap-3 pr-6 border-r-2 border-dashed border-slate-300">
                                {awayStaff.map(s => <StaffCard3D key={s.id} s={s} statusData={statusData}/>)}
                                {awayStaff.length===0 && <span className="text-xs text-gray-400">All In</span>}
                            </div>
                            <div className="flex flex-row-reverse gap-3 pl-2">
                                {activeStaff.map((s, idx) => {
                                    const isReady = (!s.activeBooking && statusData[s.id].status === 'READY');
                                    return <StaffCard3D key={s.id} s={s} statusData={statusData} queueIndex={isReady?idx:undefined}/>
                                })}
                                {activeStaff.length===0 && <span className="text-xs text-gray-400">No Active</span>}
                            </div>
                        </div>
                    </div>

                    {/* DASHBOARD TABS */}
                    <main className="flex-1 p-4 overflow-y-auto flex flex-col gap-4">
                        <div className="flex gap-2 mb-2">
                            <button onClick={()=>setActiveTab('list')} className={`px-4 py-2 rounded-lg font-bold flex gap-2 items-center ${activeTab==='list'?'bg-slate-800 text-white':'bg-white text-slate-600 shadow'}`}><Icon d={PATHS.List} size={16}/> Danh sách</button>
                            <button onClick={()=>setActiveTab('timeline')} className={`px-4 py-2 rounded-lg font-bold flex gap-2 items-center ${activeTab==='timeline'?'bg-slate-800 text-white':'bg-white text-slate-600 shadow'}`}><Icon d={PATHS.Chart} size={16}/> Sơ đồ & Timeline</button>
                            <button onClick={()=>setActiveTab('revenue')} className={`px-4 py-2 rounded-lg font-bold flex gap-2 items-center ${activeTab==='revenue'?'bg-slate-800 text-white':'bg-white text-slate-600 shadow'}`}><Icon d={PATHS.Dollar} size={16}/> Doanh thu</button>
                        </div>

                        {activeTab === 'list' && (
                            <div className="bg-white rounded-xl shadow border overflow-hidden">
                                <table className="w-full text-sm text-left">
                                    <thead className="bg-slate-100 text-slate-500 uppercase"><tr><th className="p-3">Time</th><th className="p-3">Name</th><th className="p-3">Service</th><th className="p-3">Staff</th><th className="p-3">Status</th></tr></thead>
                                    <tbody className="divide-y">
                                        {bookings.map((b,i)=>(
                                            <tr key={i} className="hover:bg-slate-50">
                                                <td className="p-3 font-mono font-bold text-indigo-700">{b.time}</td>
                                                <td className="p-3 font-bold">{b.customerName}</td>
                                                <td className="p-3 text-gray-600">{b.serviceName.split('(')[0]}</td>
                                                <td className="p-3"><span className="bg-indigo-50 text-indigo-700 px-2 py-1 rounded text-xs font-bold">{b.staffId}</span></td>
                                                <td className="p-3"><span className={`px-2 py-1 rounded text-xs font-bold ${b.status==='cancelled'?'bg-red-100 text-red-600':'bg-emerald-100 text-emerald-600'}`}>{b.status}</span></td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}

                        {activeTab === 'timeline' && (
                            <div className="space-y-4">
                                <TimelineView bookings={bookings} />
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="bg-white p-4 rounded-xl shadow h-40 flex flex-col justify-center items-center border border-purple-200">
                                        <div className="text-3xl font-black text-purple-600">{6 - bookings.filter(b=>b.type==='BED' && b.status==='active').length} / 6</div>
                                        <div className="text-gray-500 font-bold">Giường trống</div>
                                    </div>
                                    <div className="bg-white p-4 rounded-xl shadow h-40 flex flex-col justify-center items-center border border-emerald-200">
                                        <div className="text-3xl font-black text-emerald-600">{6 - bookings.filter(b=>b.type==='CHAIR' && b.status==='active').length} / 6</div>
                                        <div className="text-gray-500 font-bold">Ghế trống</div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'revenue' && <RevenueTable bookings={bookings} />}
                    </main>

                    {showManager && <CheckInBoard staffList={staffList} statusData={statusData} setStatusData={setStatusData} onClose={()=>setShowManager(false)} />}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
