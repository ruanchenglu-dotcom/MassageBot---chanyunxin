<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XinWuChan POS - Professional</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.6.7/axios.min.js"></script>

    <style>
        body { font-family: 'Microsoft JhengHei', sans-serif; background-color: #f1f5f9; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .card-shadow { box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        
        /* STYLE THẺ NHÂN VIÊN */
        .staff-card { min-width: 90px; height: 110px; transition: all 0.2s; border-top: 4px solid transparent; }
        .staff-card:hover { transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        
        /* GIỚI TÍNH */
        .female-style { border-color: #EC4899; } /* Hồng đậm */
        .female-name { color: #BE123C; font-weight: 900; } /* Chữ đỏ đậm */
        
        .male-style { border-color: #3B82F6; }   /* Xanh */
        .male-name { color: #1E3A8A; font-weight: 700; }

        /* STATUS COLORS */
        .st-ready { background-color: #10B981; color: white; }
        .st-working { background-color: #EF4444; color: white; animation: pulse-red 2s infinite; }
        .st-off { background-color: #9CA3AF; color: #eee; }
        .st-break { background-color: #F59E0B; color: white; }

        /* ANIMATION */
        .blink-red { animation: pulse-red 2s infinite; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        
        /* TIMELINE GRID */
        .timeline-grid { background-size: 5.55% 100%; background-image: linear-gradient(to right, #e5e7eb 1px, transparent 1px); }
        
        /* ERROR BOX */
        #error-box { display: none; position: fixed; inset: 0; background: #fee2e2; color: #991b1b; padding: 2rem; z-index: 9999; }
    </style>
</head>
<body>
    <div id="error-box">
        <h1 class="text-2xl font-bold">⚠️ 系統錯誤 (Error)</h1>
        <pre id="error-msg" class="mt-4 text-sm bg-white p-4 rounded border border-red-300">Loading...</pre>
        <button onclick="location.reload()" class="mt-6 bg-red-600 text-white px-6 py-2 rounded font-bold">Reload</button>
    </div>
    <div id="root"></div>

    <script>
        window.onerror = function(msg, url, line) {
            document.getElementById('root').style.display = 'none';
            document.getElementById('error-box').style.display = 'block';
            document.getElementById('error-msg').innerText = `${msg}\nLine: ${line}`;
        };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- ICONS ---
        const Icon = ({ d, size=20, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}><path d={d}/></svg>;
        const PATHS = {
            Grid: "M3 3h7v7H3zM14 3h7v7h-7zM14 14h7v7h-7zM3 14h7v7H3z", Refresh: "M23 4v6h-6M1 20v-6h6", Plus: "M12 5v14M5 12h14", Clock: "M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10zM12 6v6l4 2", Trash: "M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2", Armchair: "M19 9V6a2 2 0 0 0-2-2H7a2 2 0 0 0-2 2v3M3 16a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-5a2 2 0 0 0-4 0v2H7v-2a2 2 0 0 0-4 0ZM5 18v2M19 18v2", Bed: "M2 4v16M2 8h18a2 2 0 0 1 2 2v10M2 17h20M6 8v9", X: "M18 6L6 18M6 6l12 12", Users: "M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M9 7a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75", Coffee: "M18 8h1a4 4 0 0 1 0 8h-1M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8zM6 1v3M10 1v3M14 1v3", LogOut: "M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9", Search: "M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z", Play: "M5 3l14 9-14 9V3z", Check: "M20 6L9 17l-5-5"
        };

        // --- CẤU HÌNH DỊCH VỤ (ĐÃ CẬP NHẬT V64.0) ---
        const SERVICES = [
            // COMBO
            { id: 'CB_190', name: '👑 帝王套餐 (190分)', time: 190, foot: 80, body: 110, type: 'combo', price: 2000 },
            { id: 'CB_130', name: '💎 豪華套餐 (130分)', time: 130, foot: 50, body: 80, type: 'combo', price: 1500 },
            { id: 'CB_100', name: '🔥 招牌套餐 (100分)', time: 100, foot: 40, body: 60, type: 'combo', price: 999 },
            { id: 'CB_70',  name: '⚡ 精選套餐 (70分)',  time: 70,  foot: 30, body: 40, type: 'combo', price: 900 },
            
            // FOOT
            { id: 'FT_120', name: '👣 足底按摩 (120分)', time: 120, foot: 120, body: 0, type: 'foot', price: 1500 },
            { id: 'FT_90',  name: '👣 足底按摩 (90分)',  time: 90,  foot: 90,  body: 0, type: 'foot', price: 999 },
            { id: 'FT_70',  name: '👣 足底按摩 (70分)',  time: 70,  foot: 70,  body: 0, type: 'foot', price: 900 },
            { id: 'FT_40',  name: '👣 足底按摩 (40分)',  time: 40,  foot: 40,  body: 0, type: 'foot', price: 500 },
            
            // BODY
            { id: 'BD_120', name: '🛏️ 全身指壓 (120分)', time: 120, foot: 0, body: 120, type: 'body', price: 1500 },
            { id: 'BD_90',  name: '🛏️ 全身指壓 (90分)',  time: 90,  foot: 0, body: 90,  type: 'body', price: 999 },
            { id: 'BD_70',  name: '🛏️ 全身指壓 (70分)',  time: 70,  foot: 0, body: 70,  type: 'body', price: 900 },
            { id: 'BD_35',  name: '🛏️ 半身指壓 (35分)',  time: 35,  foot: 0, body: 35,  type: 'body', price: 500 },
        ];

        const RESOURCES = {
            chair: Array.from({ length: 6 }, (_, i) => ({ id: `chair_${i + 1}`, name: `足浴 ${i + 1}` })),
            bed: Array.from({ length: 6 }, (_, i) => ({ id: `bed_${i + 1}`, name: `身體 ${i + 1}` })),
        };

        const formatTime = (d) => d ? new Date(d).toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit', hour12:false}) : '--:--';
        const parseDate114 = (str) => {
            if(!str) return new Date();
            try { const [d, t] = str.split(' '); const [y, m, day] = d.split('/'); const [hh, mm] = t.split(':'); return new Date(parseInt(y)+1911, parseInt(m)-1, parseInt(day), parseInt(hh), parseInt(mm)); } catch(e){ return new Date(); }
        };

        // --- TIMELINE COMPONENT ---
        const TimelineComponent = ({ bookings }) => {
            const startHour = 8; const totalHours = 18; 
            const hours = Array.from({length: totalHours + 1}, (_, i) => (startHour + i) % 24);

            const getPosition = (date, duration) => {
                if(!date) return { left: '0%', width: '0%' };
                let h = date.getHours(); let m = date.getMinutes();
                if (h < startHour) h += 24;
                const startMins = (h - startHour) * 60 + m;
                const left = (startMins / (totalHours * 60)) * 100;
                const width = (duration / (totalHours * 60)) * 100;
                return { left: `${Math.max(0, left)}%`, width: `${Math.min(100, width)}%` };
            };

            return (
                <div className="flex flex-col h-full bg-white border rounded-b-xl text-xs overflow-hidden">
                    <div className="flex border-b bg-slate-50 shrink-0 h-8">
                        <div className="w-14 border-r p-2 font-bold text-center sticky left-0 bg-slate-50 z-20">Res</div>
                        <div className="flex-1 relative">{hours.map((h, i) => (<div key={i} className="absolute border-l pl-1 h-full text-slate-400" style={{ left: `${(i / totalHours) * 100}%` }}>{h}</div>))}</div>
                    </div>
                    <div className="flex-1 overflow-y-auto relative">
                        <div className="absolute inset-0 timeline-grid w-full h-full pointer-events-none z-0"></div>
                        {[...RESOURCES.chair, ...RESOURCES.bed].map(res => (
                            <div key={res.id} className="flex border-b h-8 relative hover:bg-slate-50">
                                <div className="w-14 shrink-0 border-r font-bold text-slate-600 bg-white sticky left-0 z-10 flex items-center justify-center text-[9px]">{res.name}</div>
                                <div className="flex-1 relative">
                                    {bookings.filter(b => (b.resourceId === res.id || b.resource1 === res.id || b.resource2 === res.id) && b.status !== 'cancelled').map(b => {
                                        const svc = SERVICES.find(s => b.serviceName.includes(s.name.split('(')[0])) || { time: 60 };
                                        const pos = getPosition(b.startTimeFull, svc.time);
                                        return (<div key={b.rowId} className={`absolute top-1 bottom-1 rounded px-1 flex items-center overflow-hidden text-white text-[8px] cursor-pointer z-10 ${b.status==='active'?'bg-red-500':'bg-emerald-500'}`} style={{ left: pos.left, width: pos.width }} title={b.customerName}>{b.customerName.split(' ')[0]}</div>);
                                    })}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // --- APP ---
        function App() {
            const [bookings, setBookings] = useState([]);
            const [staffList, setStaffList] = useState([]);
            const [checkedInStaff, setCheckedInStaff] = useState([]); 
            const [loading, setLoading] = useState(true);
            const [viewMode, setViewMode] = useState('dashboard');
            const [listViewMode, setListViewMode] = useState('table');
            
            const [isAddModal, setIsAddModal] = useState(false);
            const [actionModal, setActionModal] = useState(null);
            const [form, setForm] = useState({ name: '', phone: '', pax: 1, date: new Date().toISOString().split('T')[0], time: '14:00', details: [{ serviceId: 'CB_100', staffId: '' }] });

            const [searchRes, setSearchRes] = useState(null);
            const [searchParams, setSearchParams] = useState({ svcId: 'CB_100', pax: 1 });

            // FETCH
            const fetchData = async () => {
                try {
                    const res = await axios.get('/api/info');
                    const { bookings: rawBookings, staffList: rawStaff, schedule } = res.data;
                    const savedCheckIn = JSON.parse(localStorage.getItem('checkedInStaff') || '[]');
                    setCheckedInStaff(savedCheckIn);

                    const mappedBookings = rawBookings.map((b, idx) => {
                        const start = parseDate114(b.startTimeString);
                        const svc = SERVICES.find(s => b.serviceName.includes(s.name.split('(')[0])) || SERVICES[0];
                        const end = new Date(start.getTime() + svc.time * 60000);
                        
                        let resId = 'queue';
                        if (svc.type === 'foot') resId = `chair_${(idx%6)+1}`;
                        else if (svc.type === 'body') resId = `bed_${(idx%6)+1}`;
                        else resId = `bed_${(idx%6)+1}`; 

                        let status = 'scheduled';
                        const now = new Date();
                        if (b.status && b.status.includes('取消')) status = 'cancelled';
                        else if (b.status && b.status.includes('Started:')) status = 'started';
                        else if (now >= start && now <= end) status = 'active';
                        
                        return { ...b, id: idx, startTimeFull: start, endTimeFull: end, status, resourceId: resId, svc };
                    });
                    
                    mappedBookings.sort((a, b) => b.startTimeFull - a.startTimeFull);
                    setBookings(mappedBookings);

                    const mappedStaff = rawStaff.map(s => {
                        const checkInData = savedCheckIn.find(c => c.id === s.id);
                        const isCheckedIn = !!checkInData;
                        const checkInTime = checkInData ? checkInData.time : 0;

                        const currentJob = mappedBookings.find(b => b.staffId === s.id && (b.status === 'active' || b.status === 'started'));
                        const isOff = schedule.some(sch => sch.staffId === s.id);
                        
                        let status = 'ready';
                        if (isOff) status = 'off';
                        else if (!isCheckedIn) status = 'off';
                        else if (currentJob) status = currentJob.customerName === 'Staff Action' ? 'break' : 'working';
                        
                        return { ...s, status, checkInTime, currentJob };
                    });

                    mappedStaff.sort((a, b) => {
                         if (a.status === 'off' && b.status !== 'off') return 1;
                         if (b.status === 'off' && a.status !== 'off') return -1;
                         return a.checkInTime - b.checkInTime; 
                    });

                    setStaffList(mappedStaff);
                    setLoading(false);
                } catch (e) { console.error(e); }
            };

            useEffect(() => { fetchData(); const t = setInterval(fetchData, 10000); return () => clearInterval(t); }, []);

            // ACTIONS
            const toggleCheckIn = (s) => {
                let newCheckIn = [...checkedInStaff];
                if (newCheckIn.find(c => c.id === s.id)) newCheckIn = newCheckIn.filter(c => c.id !== s.id);
                else newCheckIn.push({ id: s.id, time: Date.now() });
                localStorage.setItem('checkedInStaff', JSON.stringify(newCheckIn));
                setCheckedInStaff(newCheckIn);
                fetchData();
            };
            const handleStaffAction = async (action, duration) => { if(!actionModal) return; try { await axios.post('/api/admin-staff-action', { staffId: actionModal.id, action, duration }); setActionModal(null); fetchData(); } catch(e) {} };
            const handleUpdateStatus = async (rowId, status) => { if(!confirm("確認?")) return; await axios.post('/api/update-status', { rowId, status }); fetchData(); };
            
            const handleStartJob = async (b) => {
                const nowStr = new Date().toTimeString().slice(0, 5);
                await axios.post('/api/update-status', { rowId: b.rowId, status: `Started:${nowStr}` });
                fetchData();
            };
            const handleFinishJob = async (b) => {
                if(!confirm("Hoàn tất?")) return;
                await axios.post('/api/update-status', { rowId: b.rowId, status: 'Completed' });
                fetchData();
            };

            const updateGuestCount = (n) => { const count = parseInt(n); setForm(prev => { const newGuests = [...prev.details]; if (count > newGuests.length) { for(let i=newGuests.length; i<count; i++) newGuests.push({ serviceId: 'CB_100', staffId: '' }); } else { newGuests.splice(count); } return { ...prev, pax: count, details: newGuests }; }); };
            const handleBookingSubmit = async () => {
                 if (!form.name) return alert("Nhập tên!");
                 for (let i=0; i<form.details.length; i++) {
                    const detail = form.details[i];
                    const svc = SERVICES.find(s => s.id === detail.serviceId);
                    await axios.post('/api/admin-booking', {
                        ngayDen: form.date, gioDen: form.time, dichVu: svc.name, nhanVien: detail.staffId || '隨機',
                        sdt: form.phone, hoTen: `${form.name} (${i+1}/${form.pax})`, pax: 1, isWalkIn: true
                    });
                }
                setIsAddModal(false); fetchData();
            };

            // SMART SEARCH
            const findFastest = () => {
                const svc = SERVICES.find(s=>s.id === searchParams.svcId);
                let checkTime = new Date();
                checkTime.setMinutes(Math.ceil(checkTime.getMinutes()/15)*15);
                for(let i=0; i<24; i++) {
                    const t = new Date(checkTime.getTime() + i*15*60000);
                    const freeStaff = staffList.filter(s => {
                        if(s.status === 'off') return false;
                        if(s.status === 'ready') return true;
                        return s.currentJob && s.currentJob.endTimeFull <= t;
                    }).length;
                    if (freeStaff >= searchParams.pax) { setSearchRes(formatTime(t)); return; }
                }
                setSearchRes("Full");
            };

            // UI
            const StaffCard = ({ s }) => {
                const isFemale = s.gender === 'F' || s.gender === '女';
                let stClass = 'st-ready'; let stText = '待命';
                if(s.status === 'working') { stClass = 'st-working'; stText = '忙碌'; }
                if(s.status === 'break') { stClass = 'st-break'; stText = '休息'; }
                if(s.status === 'off') { stClass = 'st-off'; stText = '未到'; }

                return (
                    <div onClick={()=>setActionModal(s)} className={`staff-card shrink-0 bg-white rounded shadow cursor-pointer flex flex-col items-center justify-between relative border-2 ${isFemale?'female-style':'male-style'} ${s.status==='off'?'opacity-50':''}`}>
                         <div className={`w-full h-1.5 ${stClass}`}></div>
                         <div className="flex-1 flex flex-col items-center justify-center">
                             <div className={`font-black text-2xl ${isFemale?'female-name':'male-name'}`}>{s.name.replace('號','')}</div>
                             <div className="text-[10px] text-slate-500">{isFemale?'女':'男'}</div>
                         </div>
                         <div className={`w-full text-center text-[10px] text-white font-bold py-0.5 ${stClass}`}>{stText}</div>
                         {s.status === 'working' && s.currentJob && <div className="absolute bottom-6 w-full text-[9px] bg-red-500 text-white text-center truncate">{s.currentJob.customerName}</div>}
                    </div>
                )
            };

            const ResourceCard = ({ res, type }) => {
                const active = bookings.find(b => b.resourceId === res.id && (b.status === 'active' || b.status === 'started'));
                
                return (
                    <div className={`p-2 rounded-xl border-2 h-36 flex flex-col justify-between shadow-sm cursor-pointer bg-white ${active ? (active.status==='started'?'bg-red-50 border-red-500 blink-red':'bg-yellow-50 border-yellow-400') : 'border-emerald-200 hover:border-emerald-400'}`} onClick={()=>!active && setIsAddModal(true)}>
                        <div className="flex justify-between"><span className="font-bold text-xs text-slate-600">{res.name}</span>{active && <span className="text-[9px] bg-white px-1 rounded border shadow font-bold">{active.status==='started'?'WORKING':'BOOKED'}</span>}</div>
                        
                        {active ? (
                            <div className="flex-1 flex flex-col justify-center space-y-1">
                                <div className="text-sm font-bold truncate text-slate-800">{active.customerName}</div>
                                <div className="text-[10px] text-slate-500 flex justify-between"><span>{active.svc.name.split('(')[0]}</span><span className="bg-blue-100 px-1 rounded text-blue-700 font-bold">{active.staffId}</span></div>
                                <div className="text-[10px] font-mono text-right text-red-600">{formatTime(active.endTimeFull)} 完</div>
                                <div className="grid grid-cols-2 gap-1 pt-1 border-t">
                                    {!active.realStartTime ? <button onClick={(e)=>{e.stopPropagation();handleStartJob(active)}} className="bg-blue-600 text-white text-[9px] rounded py-1">Start</button> : <button onClick={(e)=>{e.stopPropagation();handleFinishJob(active)}} className="bg-green-600 text-white text-[9px] rounded py-1">Done</button>}
                                    <button onClick={(e)=>{e.stopPropagation();handleUpdateStatus(active.rowId,'Cancelled')}} className="bg-gray-200 text-red-600 text-[9px] rounded py-1">Cancel</button>
                                </div>
                            </div>
                        ) : <div className="text-center text-slate-300 flex items-center justify-center h-full"><Icon d={type==='chair'?ICONS.Armchair:ICONS.Bed} size={24}/></div>}
                    </div>
                )
            };

            return (
                <div className="min-h-screen flex flex-col bg-slate-100">
                    <header className="bg-slate-900 text-white p-2 flex justify-between items-center shadow shrink-0 z-50">
                        <div className="font-bold flex gap-2 items-center px-2"><Icon d={ICONS.Grid}/> POS</div>
                        <div className="flex items-center bg-slate-800 rounded p-1 gap-1">
                            <span className="text-[10px] text-slate-400 hidden md:block">Search:</span>
                            <select className="bg-slate-700 text-[10px] rounded p-1 w-20" value={searchParams.svcId} onChange={e=>setSearchParams({...searchParams, svcId:e.target.value})}>{SERVICES.map(s=><option value={s.id}>{s.name.split(' ')[0]}</option>)}</select>
                            <select className="bg-slate-700 text-[10px] rounded p-1" value={searchParams.pax} onChange={e=>setSearchParams({...searchParams, pax:parseInt(e.target.value)})}>{[1,2,3,4].map(n=><option value={n}>{n}</option>)}</select>
                            <button onClick={findFastest} className="bg-blue-600 px-2 py-1 rounded text-[10px] font-bold">Go</button>
                            <span className="text-amber-400 text-[10px] font-mono px-1 font-bold">{searchRes || '--:--'}</span>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={()=>setViewMode('dashboard')} className="bg-slate-700 px-2 py-1 rounded text-[10px]">Sơ đồ</button>
                            <button onClick={()=>setViewMode('staff_mgr')} className="bg-slate-700 px-2 py-1 rounded text-[10px]">CheckIn</button>
                            <button onClick={()=>setIsAddModal(true)} className="bg-amber-500 text-black px-3 py-1 rounded font-bold text-xs flex gap-1 items-center"><Icon d={ICONS.Plus} size={14}/> Add</button>
                        </div>
                    </header>

                    {viewMode === 'dashboard' && (
                        <div className="bg-white p-2 border-b shadow-sm overflow-x-auto flex flex-row-reverse gap-2 shrink-0 h-32 items-center px-2">
                            {staffList.map(s => <StaffCard key={s.id} s={s} />)}
                        </div>
                    )}

                    <main className="flex-1 overflow-y-auto p-3 space-y-3">
                        {viewMode === 'dashboard' ? (
                            <>
                                <div className="grid grid-cols-2 gap-2">
                                    <div className="bg-white p-2 rounded shadow">
                                        <div className="text-xs font-bold mb-1 text-slate-500">足浴 (Foot)</div>
                                        <div className="grid grid-cols-3 gap-1">{RESOURCES.chair.map(r=><ResourceCard key={r.id} res={r} type="chair"/>)}</div>
                                    </div>
                                    <div className="bg-white p-2 rounded shadow">
                                        <div className="text-xs font-bold mb-1 text-slate-500">身體 (Body)</div>
                                        <div className="grid grid-cols-3 gap-1">{RESOURCES.bed.map(r=><ResourceCard key={r.id} res={r} type="bed"/>)}</div>
                                    </div>
                                </div>
                                <div className="bg-white rounded shadow border overflow-hidden flex flex-col h-[300px]">
                                    <div className="p-2 bg-slate-50 border-b flex justify-between items-center">
                                        <h3 className="font-bold text-xs text-slate-700 flex gap-1"><Icon d={ICONS.Clock} size={14}/> List</h3>
                                        <div className="flex bg-slate-200 p-0.5 rounded text-[10px]">
                                            <button onClick={()=>setListViewMode('table')} className={`px-2 py-0.5 rounded ${listViewMode==='table'?'bg-white shadow':''}`}>Table</button>
                                            <button onClick={()=>setListViewMode('timeline')} className={`px-2 py-0.5 rounded ${listViewMode==='timeline'?'bg-white shadow':''}`}>Timeline</button>
                                        </div>
                                    </div>
                                    <div className="flex-1 overflow-hidden">
                                        {listViewMode === 'table' ? (
                                            <div className="h-full overflow-y-auto">
                                                <table className="w-full text-[10px] text-left">
                                                    <thead className="bg-slate-100 sticky top-0"><tr><th className="p-2">Time</th><th className="p-2">Name</th><th className="p-2">Svc</th><th className="p-2">Staff</th><th className="p-2 text-right">Act</th></tr></thead>
                                                    <tbody className="divide-y">
                                                        {bookings.map(b=>(<tr key={b.rowId} className={b.status==='cancelled'?'opacity-50 bg-gray-100':''}>
                                                            <td className="p-2 font-mono text-emerald-700">{formatTime(b.startTimeFull)}</td>
                                                            <td className="p-2 font-bold">{b.customerName}</td>
                                                            <td className="p-2">{b.serviceName.split('(')[0]}</td>
                                                            <td className="p-2">{b.staffId}</td>
                                                            <td className="p-2 text-right">{b.status!=='cancelled' && <button onClick={()=>handleUpdateStatus(b.rowId, '❌ Cancel')} className="text-red-500"><Icon d={ICONS.Trash} size={12}/></button>}</td>
                                                        </tr>))}
                                                    </tbody>
                                                </table>
                                            </div>
                                        ) : <TimelineComponent bookings={bookings}/>}
                                    </div>
                                </div>
                            </>
                        ) : (
                            <div className="bg-white rounded shadow p-4">
                                <h2 className="font-bold mb-4 flex gap-2"><Icon d={ICONS.Users}/> Check-In Manager</h2>
                                <div className="grid grid-cols-4 gap-3">
                                    {staffList.map(s => (
                                        <div key={s.id} onClick={()=>toggleCheckIn(s)} className={`p-3 rounded border-2 cursor-pointer text-center ${s.status!=='off'?'border-emerald-500 bg-emerald-50':'border-slate-200 grayscale'}`}>
                                            <div className="font-bold text-lg">{s.name}</div>
                                            <div className="text-xs mt-1">{s.status!=='off'?'IN':'OUT'}</div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* MODALS */}
                    {isAddModal && (
                        <div className="fixed inset-0 bg-black/70 z-[99] flex items-center justify-center p-4">
                            <div className="bg-white rounded-xl w-full max-w-md p-6 shadow-2xl h-[80vh] flex flex-col">
                                <div className="flex justify-between mb-4"><h3 className="font-bold text-lg">Add Booking</h3><button onClick={()=>setIsAddModal(false)}><Icon d={ICONS.X}/></button></div>
                                <div className="flex-1 overflow-y-auto space-y-3">
                                    <input className="border w-full p-2 rounded" placeholder="Name" value={form.name} onChange={e=>setForm({...form, name:e.target.value})}/>
                                    <input className="border w-full p-2 rounded" placeholder="Phone" value={form.phone} onChange={e=>setForm({...form, phone:e.target.value})}/>
                                    <div className="flex gap-2">
                                        <input type="time" className="border w-full p-2 rounded" value={form.time} onChange={e=>setForm({...form, time:e.target.value})}/>
                                        <select className="border w-full p-2 rounded font-bold" value={form.pax} onChange={e=>updateGuestCount(e.target.value)}>{[1,2,3,4,5].map(n=><option value={n}>{n} Pax</option>)}</select>
                                    </div>
                                    {form.details.map((d,i)=>(
                                        <div key={i} className="bg-slate-50 p-2 rounded border text-xs space-y-2">
                                            <div className="font-bold text-slate-500">Guest {i+1}</div>
                                            <select className="w-full border rounded p-1" value={d.serviceId} onChange={e=>{const ng=[...form.details]; ng[i].serviceId=e.target.value; setForm({...form, details:ng})}}>{SERVICES.map(s=><option value={s.id}>{s.name}</option>)}</select>
                                            <select className="w-full border rounded p-1" value={d.staffId} onChange={e=>{const ng=[...form.details]; ng[i].staffId=e.target.value; setForm({...form, details:ng})}}><option value="">Random</option>{staffList.map(s=><option value={s.id}>{s.name}</option>)}</select>
                                        </div>
                                    ))}
                                </div>
                                <button onClick={handleBookingSubmit} className="w-full bg-emerald-600 text-white py-3 rounded font-bold mt-2 shadow">Confirm</button>
                            </div>
                        </div>
                    )}

                    {actionModal && (
                        <div className="fixed inset-0 bg-black/60 z-[60] flex items-center justify-center p-4">
                            <div className="bg-white w-64 p-4 rounded-xl shadow-xl text-center">
                                <h3 className="font-bold text-lg mb-4">{actionModal.name}</h3>
                                <div className="space-y-2">
                                    <button onClick={()=>handleStaffAction('break', 30)} className="w-full py-2 bg-yellow-100 text-yellow-800 rounded font-bold">🍱 Eat</button>
                                    <button onClick={()=>handleStaffAction('leave', 0)} className="w-full py-2 bg-red-100 text-red-800 rounded font-bold">🏠 Off</button>
                                    <button onClick={()=>setActionModal(null)} className="w-full py-2 border rounded mt-2">Close</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
