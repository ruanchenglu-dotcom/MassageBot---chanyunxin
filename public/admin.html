<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XinWuChan POS - Horizon View</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.6.7/axios.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: 'Microsoft JhengHei', sans-serif; background-color: #f0f2f5; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .timeline-grid { background-image: linear-gradient(to right, #e5e7eb 1px, transparent 1px); background-size: 5.55% 100%; } /* 100% / 18h = 5.55% */
        
        /* Thẻ nhân viên chữ nhật */
        .staff-card {
            min-width: 100px; /* Chiều rộng khoảng 20 đơn vị */
            height: 60px;    /* Chiều cao khoảng 10 đơn vị */
            transition: all 0.2s;
        }
        .staff-card:hover { transform: translateY(-2px); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        
        .st-ready { background: #10B981; color: white; }
        .st-working { background: #EF4444; color: white; animation: pulse 2s infinite; }
        .st-off { background: #9CA3AF; color: #eee; opacity: 0.6; }
        .st-break { background: #F59E0B; color: white; }
        
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 5px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { LayoutGrid, Users, Plus, Clock, Bed, Armchair, RefreshCw, X, Check, Phone, Edit, Trash2, List, Calendar, LogOut, Coffee } = lucide;

        // --- CẤU HÌNH DỊCH VỤ ---
        const SERVICES = [
            { id: 'CB_190', name: '👑 帝王套餐 (190分)', duration: 190, type: 'combo' },
            { id: 'CB_130', name: '💎 豪華套餐 (130分)', duration: 130, type: 'combo' },
            { id: 'CB_100', name: '🔥 招牌套餐 (100分)', duration: 100, type: 'combo' },
            { id: 'CB_70',  name: '⚡ 精選套餐 (70分)',  duration: 70,  type: 'combo' },
            { id: 'FT_120', name: '👣 足底按摩 (120分)', duration: 120, type: 'foot' },
            { id: 'FT_90',  name: '👣 足底按摩 (90分)',  duration: 90,  type: 'foot' },
            { id: 'FT_70',  name: '👣 足底按摩 (70分)',  duration: 70,  type: 'foot' },
            { id: 'FT_40',  name: '👣 足底按摩 (40分)',  duration: 40,  type: 'foot' },
            { id: 'BD_120', name: '🛏️ 全身指壓 (120分)', duration: 120, type: 'body' },
            { id: 'BD_90',  name: '🛏️ 全身指壓 (90分)',  duration: 90,  type: 'body' },
            { id: 'BD_70',  name: '🛏️ 全身指壓 (70分)',  duration: 70,  type: 'body' },
            { id: 'BD_35',  name: '🛏️ 半身指壓 (35分)',  duration: 35,  type: 'body' },
        ];

        const RESOURCES = {
            chair: Array.from({ length: 6 }, (_, i) => ({ id: `chair_${i + 1}`, name: `Foot ${i + 1}` })),
            bed: Array.from({ length: 6 }, (_, i) => ({ id: `bed_${i + 1}`, name: `Body ${i + 1}` })),
        };

        const parseDate114 = (str) => {
            if (!str) return new Date();
            try { const [d, t] = str.split(' '); const [y, m, day] = d.split('/'); const [hh, mm] = t.split(':'); return new Date(parseInt(y)+1911, parseInt(m)-1, parseInt(day), parseInt(hh), parseInt(mm)); } catch (e) { return new Date(); }
        };
        const formatTime = (d) => d ? d.toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit', hour12:false}) : '--:--';
        const Icon = ({ icon, size=18, className="" }) => React.createElement(icon, { size, className });

        // --- COMPONENT TIMELINE (8:00 - 02:00) ---
        const TimelineComponent = ({ bookings }) => {
            const startHour = 8; // Bắt đầu 8h sáng
            const totalHours = 18; // 8h sáng -> 2h sáng hôm sau = 18 tiếng
            const hours = Array.from({length: totalHours + 1}, (_, i) => (startHour + i) % 24);

            const getPosition = (date, duration) => {
                let h = date.getHours();
                let m = date.getMinutes();
                if (h < startHour) h += 24; // Xử lý qua đêm (01:00 -> 25:00)
                
                const startMins = (h - startHour) * 60 + m;
                const left = (startMins / (totalHours * 60)) * 100;
                const width = (duration / (totalHours * 60)) * 100;
                
                return { left: `${Math.max(0, left)}%`, width: `${Math.min(100, width)}%` };
            };

            return (
                <div className="flex flex-col h-full bg-white border rounded-b-xl text-xs">
                    {/* Header Giờ */}
                    <div className="flex border-b bg-slate-50 shrink-0 h-8">
                        <div className="w-16 border-r p-2 font-bold text-center sticky left-0 bg-slate-50 z-10">Res</div>
                        <div className="flex-1 relative">
                            {hours.map((h, i) => (
                                <div key={i} className="absolute border-l pl-1 h-full text-slate-400" style={{ left: `${(i / totalHours) * 100}%` }}>{h}</div>
                            ))}
                        </div>
                    </div>

                    {/* Rows */}
                    <div className="flex-1 overflow-y-auto relative">
                        <div className="absolute inset-0 timeline-grid w-full h-full pointer-events-none z-0"></div>
                        {[...RESOURCES.chair, ...RESOURCES.bed].map(res => (
                            <div key={res.id} className="flex border-b h-10 relative hover:bg-slate-50">
                                <div className="w-16 shrink-0 border-r font-bold text-slate-600 bg-white sticky left-0 z-10 flex items-center justify-center text-[10px]">{res.name}</div>
                                <div className="flex-1 relative">
                                    {bookings.filter(b => (b.resourceId === res.id || b.resource1 === res.id || b.resource2 === res.id) && b.status !== 'cancelled').map(b => {
                                        const svc = SERVICES.find(s => b.serviceName.includes(s.name.split('(')[0])) || { duration: 60 };
                                        const pos = getPosition(b.startTimeFull, svc.duration);
                                        return (
                                            <div key={b.rowId} 
                                                 className={`absolute top-1 bottom-1 rounded px-1 flex items-center overflow-hidden text-white cursor-pointer z-10 ${b.status==='active'?'bg-red-500':'bg-emerald-500'}`}
                                                 style={{ left: pos.left, width: pos.width }}
                                                 title={b.customerName}>
                                                <span className="font-bold truncate text-[9px]">{b.customerName.split(' ')[0]}</span>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        ))}
                        
                        {/* Current Time Line */}
                        {(() => {
                            const now = new Date();
                            const pos = getPosition(now, 0);
                            if (parseFloat(pos.left) > 0 && parseFloat(pos.left) < 100) {
                                return <div className="absolute top-0 bottom-0 w-0.5 bg-red-600 z-20 pointer-events-none" style={{ left: pos.left }}></div>
                            }
                        })()}
                    </div>
                </div>
            );
        };

        function App() {
            const [bookings, setBookings] = useState([]);
            const [staffList, setStaffList] = useState([]);
            const [listViewMode, setListViewMode] = useState('table'); 
            const [actionModal, setActionModal] = useState(null);
            const [isAddModal, setIsAddModal] = useState(false);
            const [editModal, setEditModal] = useState(null);
            
            const [form, setForm] = useState({ name: '', phone: '', pax: 1, date: new Date().toISOString().split('T')[0], time: '14:00', details: [{ serviceId: 'CB_100', staffId: '' }] });

            const fetchData = async () => {
                try {
                    const res = await axios.get('/api/info');
                    const { bookings: apiBookings, staffList: apiStaff, schedule } = res.data;
                    const now = new Date();

                    const mappedBookings = apiBookings.map((b, idx) => {
                        const start = parseDate114(b.startTimeString);
                        const svc = SERVICES.find(s => b.serviceName.includes(s.name.split('(')[0])) || SERVICES[0];
                        const end = new Date(start.getTime() + svc.duration * 60000);
                        
                        let resId = 'queue';
                        if (svc.type === 'foot') resId = `chair_${(idx%6)+1}`;
                        else if (svc.type === 'body') resId = `bed_${(idx%6)+1}`;
                        else resId = `bed_${(idx%6)+1}`; 

                        let status = 'scheduled';
                        if (b.status && b.status.includes('取消')) status = 'cancelled';
                        else if (now >= start && now <= end) status = 'active';
                        
                        return { ...b, id: idx, startTimeFull: start, endTimeFull: end, status, resourceId: resId };
                    });
                    
                    mappedBookings.sort((a, b) => b.startTimeFull - a.startTimeFull);
                    setBookings(mappedBookings);

                    // Map Staff
                    const mappedStaff = apiStaff.map(s => {
                        const currentJob = mappedBookings.find(b => b.staffId === s.id && b.status === 'active');
                        const isOff = schedule.some(sch => sch.staffId === s.id);
                        let status = 'ready';
                        if (isOff) status = 'off';
                        if (currentJob) status = currentJob.customerName === 'Staff Action' ? 'break' : 'working';
                        return { ...s, status, currentJob };
                    });

                    // Sort theo ID
                    mappedStaff.sort((a,b) => parseInt(a.id.replace(/\D/g,'')) - parseInt(b.id.replace(/\D/g,'')));
                    setStaffList(mappedStaff);
                } catch (e) { console.error(e); }
            };

            useEffect(() => { fetchData(); const t = setInterval(fetchData, 10000); return () => clearInterval(t); }, []);

            const handleStaffAction = async (action, duration) => {
                if(!actionModal) return;
                try { await axios.post('/api/admin-staff-action', { staffId: actionModal.id, action, duration }); setActionModal(null); fetchData(); } catch(e) {}
            };

            const handleUpdateStatus = async (rowId, status) => {
                if(!confirm("Xác nhận?")) return;
                await axios.post('/api/update-status', { rowId, status });
                fetchData();
            };

            const handleBookingSubmit = async () => {
                // (Giữ nguyên logic submit)
                for (let i=0; i<form.details.length; i++) {
                    const detail = form.details[i];
                    const svc = SERVICES.find(s => s.id === detail.serviceId);
                    await axios.post('/api/admin-booking', {
                        ngayDen: form.date, gioDen: form.time, dichVu: svc.name, nhanVien: detail.staffId || '隨機',
                        sdt: form.phone, hoTen: `${form.name} (${i+1}/${form.pax})`, pax: 1, isWalkIn: true
                    });
                }
                setIsAddModal(false); fetchData();
            };

            // UI COMPONENT: THẺ NHÂN VIÊN NGANG
            const StaffCard = ({ s }) => {
                const isFemale = s.gender === 'F' || s.gender === '女';
                let stClass = 'st-ready';
                if(s.status === 'working') stClass = 'st-working';
                if(s.status === 'off') stClass = 'st-off';
                if(s.status === 'break') stClass = 'st-break';

                return (
                    <div onClick={()=>setActionModal(s)} className={`staff-card rounded-md shadow-sm border border-slate-200 flex flex-col items-center justify-center cursor-pointer relative overflow-hidden ${stClass}`}>
                        <div className="font-black text-xl">{s.name.replace('號','')}</div>
                        <div className="text-[10px] font-bold opacity-80">{s.status==='working' ? 'BẬN' : s.status==='ready' ? 'RẢNH' : 'OFF'}</div>
                        {s.status === 'working' && <div className="text-[9px] absolute bottom-0 w-full bg-black/20 text-center text-white truncate px-1">{s.currentJob?.customerName}</div>}
                        <div className={`absolute top-0 right-0 w-2 h-2 rounded-full m-1 ${isFemale?'bg-pink-400':'bg-blue-400'}`}></div>
                    </div>
                )
            };

            const ResourceCard = ({ res, type }) => {
                const active = bookings.find(b => b.resourceId === res.id && b.status === 'active');
                return (
                    <div className={`p-2 rounded-lg border-2 h-24 flex flex-col justify-between relative cursor-pointer ${active ? 'bg-red-50 border-red-400' : 'bg-white border-slate-200'}`} onClick={()=>!active && setIsAddModal(true)}>
                        <div className="flex justify-between font-bold text-slate-600 text-xs"><span>{res.name}</span>{active && <span className="text-[9px] bg-red-500 text-white px-1 rounded blink">BUSY</span>}</div>
                        {active ? (
                            <div className="text-xs">
                                <div className="font-bold truncate">{active.customerName}</div>
                                <div className="text-[10px] text-red-600 font-mono text-right">{formatTime(active.endTimeFull)} 完</div>
                            </div>
                        ) : <div className="text-center text-slate-200"><Icon icon={type==='chair'?Armchair:Bed} size={24}/></div>}
                    </div>
                )
            };

            return (
                <div className="min-h-screen flex flex-col bg-slate-100">
                    {/* HEADER */}
                    <header className="bg-slate-900 text-white p-3 shadow flex justify-between items-center sticky top-0 z-50">
                        <div className="font-bold flex gap-2"><Icon icon={LayoutGrid}/> XinWuChan POS</div>
                        <div className="flex gap-2">
                            <button onClick={fetchData}><Icon icon={RefreshCw}/></button>
                            <button onClick={()=>setIsAddModal(true)} className="bg-amber-500 text-black px-3 py-1 rounded font-bold flex gap-1"><Icon icon={Plus} size={16}/> Thêm</button>
                        </div>
                    </header>

                    {/* 1. KHU VỰC NHÂN VIÊN (HÀNG NGANG) */}
                    <div className="bg-white p-2 border-b shadow-sm overflow-x-auto flex gap-2 shrink-0 h-20 items-center">
                        {staffList.map(s => <StaffCard key={s.id} s={s} />)}
                    </div>

                    {/* MAIN CONTENT */}
                    <div className="flex-1 overflow-y-auto p-3 space-y-4">
                        
                        {/* SƠ ĐỒ GHẾ & GIƯỜNG */}
                        <div className="grid grid-cols-2 gap-4">
                            <div className="bg-white p-3 rounded-lg shadow">
                                <div className="text-xs font-bold text-slate-500 mb-2 flex gap-1"><Icon icon={Armchair} size={14}/> 足浴 (Foot)</div>
                                <div className="grid grid-cols-3 gap-2">{RESOURCES.chair.map(r => <ResourceCard key={r.id} res={r} type="chair"/>)}</div>
                            </div>
                            <div className="bg-white p-3 rounded-lg shadow">
                                <div className="text-xs font-bold text-slate-500 mb-2 flex gap-1"><Icon icon={Bed} size={14}/> 身體 (Body)</div>
                                <div className="grid grid-cols-3 gap-2">{RESOURCES.bed.map(r => <ResourceCard key={r.id} res={r} type="bed"/>)}</div>
                            </div>
                        </div>

                        {/* BẢNG / TIMELINE */}
                        <div className="bg-white rounded-lg shadow border border-slate-200 overflow-hidden flex flex-col h-[400px]">
                            <div className="p-2 bg-slate-50 border-b flex justify-between items-center">
                                <div className="text-sm font-bold text-slate-700 flex gap-2"><Icon icon={Clock} size={16}/> Lịch Đặt</div>
                                <div className="flex bg-slate-200 p-0.5 rounded text-xs">
                                    <button onClick={()=>setListViewMode('table')} className={`px-2 py-1 rounded ${listViewMode==='table'?'bg-white shadow':''}`}>📋 Bảng</button>
                                    <button onClick={()=>setListViewMode('timeline')} className={`px-2 py-1 rounded ${listViewMode==='timeline'?'bg-white shadow':''}`}>📅 Timeline</button>
                                </div>
                            </div>
                            <div className="flex-1 overflow-hidden">
                                {listViewMode === 'table' ? (
                                    <div className="h-full overflow-y-auto">
                                        <table className="w-full text-xs text-left">
                                            <thead className="bg-slate-100 sticky top-0"><tr><th className="p-2">Time</th><th className="p-2">Name</th><th className="p-2">Pax</th><th className="p-2">Svc</th><th className="p-2">Staff</th><th className="p-2 text-right">Act</th></tr></thead>
                                            <tbody className="divide-y">
                                                {bookings.map(b => (
                                                    <tr key={b.rowId} className={b.status === 'cancelled' ? 'cancelled-row' : ''}>
                                                        <td className="p-2 font-mono text-emerald-700 font-bold">{formatTime(b.startTimeFull)}</td>
                                                        <td className="p-2 font-bold">{b.customerName}</td>
                                                        <td className="p-2 text-center">{b.pax}</td>
                                                        <td className="p-2">{b.serviceName.split('(')[0]}</td>
                                                        <td className="p-2"><span className="bg-slate-100 px-1 rounded">{b.staffId}</span></td>
                                                        <td className="p-2 text-right">
                                                            {b.status !== 'cancelled' && <button onClick={()=>handleUpdateStatus(b.rowId, '❌ Cancel')} className="text-red-500 hover:bg-red-50 p-1 rounded"><Icon icon={Trash2} size={14}/></button>}
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                ) : (
                                    <TimelineComponent bookings={bookings} />
                                )}
                            </div>
                        </div>
                    </div>

                    {/* MODAL */}
                    {actionModal && (
                        <div className="fixed inset-0 bg-black/60 z-[60] flex items-center justify-center p-4">
                            <div className="bg-white w-64 p-4 rounded-xl shadow-xl text-center">
                                <h3 className="font-bold text-lg mb-4">{actionModal.name}</h3>
                                <div className="space-y-2">
                                    <button onClick={()=>handleStaffAction('break', 30)} className="w-full py-2 bg-yellow-100 text-yellow-800 rounded hover:bg-yellow-200 flex justify-center gap-2"><Icon icon={Coffee} size={16}/> Đi ăn</button>
                                    <button onClick={()=>handleStaffAction('leave', 0)} className="w-full py-2 bg-red-100 text-red-800 rounded hover:bg-red-200 flex justify-center gap-2"><Icon icon={LogOut} size={16}/> Về sớm</button>
                                    <button onClick={()=>setActionModal(null)} className="w-full py-2 border rounded mt-2 text-sm">Đóng</button>
                                </div>
                            </div>
                        </div>
                    )}
                    {/* (Add Modal logic here - same as before) */}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
