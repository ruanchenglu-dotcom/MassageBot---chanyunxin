<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新五禪 POS - Smart Client</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.6.7/axios.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Microsoft JhengHei', sans-serif; background-color: #f1f5f9; }
        .card-shadow { box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .blink { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { LayoutGrid, Users, Plus, Search, Clock, Bed, Armchair, RefreshCw, X, Check, AlertCircle, Home, Coffee } = lucide;

        // 1. CẤU HÌNH DỊCH VỤ (CLIENT SIDE CONFIG)
        const SERVICES = [
            // Combo
            { id: 'set_A', name: 'A套 (100分)', short:'A套', time: 100, foot: 40, body: 60, type: 'combo', price: 2000 },
            { id: 'set_B', name: 'B套 (130分)', short:'B套', time: 130, foot: 50, body: 80, type: 'combo', price: 1500 },
            { id: 'set_C', name: 'C套 (70分)',  short:'C套', time: 70,  foot: 30, body: 40, type: 'combo', price: 900 },
            // Body
            { id: 'body_35', name: 'B1 身體 (35分)', short:'B1', time: 35, foot: 0, body: 35, type: 'body', price: 500 },
            { id: 'body_70', name: 'B2 身體 (70分)', short:'B2', time: 70, foot: 0, body: 70, type: 'body', price: 900 },
            { id: 'body_90', name: 'B3 身體 (90分)', short:'B3', time: 90, foot: 0, body: 90, type: 'body', price: 999 },
            { id: 'body_120', name: 'B4 身體 (120分)', short:'B4', time: 120, foot: 0, body: 120, type: 'body', price: 1500 },
            // Foot
            { id: 'foot_40', name: 'F1 腳底 (40分)', short:'F1', time: 40, foot: 40, body: 0, type: 'foot', price: 500 },
            { id: 'foot_70', name: 'F2 腳底 (70分)', short:'F2', time: 70, foot: 70, body: 0, type: 'foot', price: 900 },
            { id: 'foot_90', name: 'F3 腳底 (90分)', short:'F3', time: 90, foot: 90, body: 0, type: 'foot', price: 999 },
            { id: 'foot_120', name: 'F4 腳底 (120分)', short:'F4', time: 120, foot: 120, body: 0, type: 'foot', price: 1500 },
        ];

        const RESOURCES = {
            chair: Array.from({ length: 6 }, (_, i) => ({ id: `chair_${i + 1}`, name: `Foot ${i + 1}` })),
            bed: Array.from({ length: 6 }, (_, i) => ({ id: `bed_${i + 1}`, name: `Body ${i + 1}` })),
        };

        // Helper: Parse ngày 114
        const parse114 = (str) => {
            if(!str) return new Date();
            try { const [d, t] = str.split(' '); const [y, m, day] = d.split('/'); const [hh, mm] = t.split(':'); return new Date(parseInt(y)+1911, parseInt(m)-1, parseInt(day), parseInt(hh), parseInt(mm)); } catch(e){ return new Date(); }
        };
        const formatTime = (d) => d ? d.toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit', hour12:false}) : '--:--';
        
        function App() {
            const [bookings, setBookings] = useState([]);
            const [staffList, setStaffList] = useState([]);
            const [loading, setLoading] = useState(false);
            const [now, setNow] = useState(new Date());

            // Modal States
            const [isAddModal, setIsAddModal] = useState(false);
            const [staffActionModal, setStaffActionModal] = useState(null);
            
            // Booking Form
            const [form, setForm] = useState({
                type: 'walk_in', // walk_in | booking
                name: '', phone: '', 
                date: new Date().toISOString().split('T')[0], 
                time: new Date().toTimeString().slice(0,5),
                pax: 1,
                guests: [{ id: 1, svcId: 'set_A', staffId: '', isBodyFirst: false, isOil: false }]
            });

            // Search State
            const [searchRes, setSearchRes] = useState(null);
            const [searchParams, setSearchParams] = useState({ svcId: 'set_A', pax: 1 });

            // --- 1. FETCH DATA ---
            const fetchData = async () => {
                try {
                    const res = await axios.get('/api/info');
                    const { bookings: rawBookings, staffList: rawStaff, schedule } = res.data;
                    
                    // Process Bookings
                    const processedBookings = rawBookings.map((b, i) => {
                        const start = parse114(b.startTimeString);
                        // Tìm service config
                        const svcConfig = SERVICES.find(s => s.name.includes(b.serviceName.split('(')[0])) || SERVICES[0];
                        const duration = svcConfig.time;
                        const end = new Date(start.getTime() + duration * 60000);
                        
                        // Logic trạng thái
                        let status = 'scheduled';
                        const diffMins = (start - new Date()) / 60000;
                        if (new Date() >= start && new Date() <= end) status = 'active'; // Đỏ: Đang làm
                        else if (diffMins > 0 && diffMins <= 30) status = 'soon'; // Vàng: Sắp tới

                        // Logic Chuyển Trạm
                        let currentZone = 'none';
                        let transitionTime = null;
                        let isBodyFirst = b.serviceName.includes('身先');
                        
                        if (svcConfig.type === 'combo') {
                            const firstPartDur = isBodyFirst ? svcConfig.body : svcConfig.foot;
                            transitionTime = new Date(start.getTime() + firstPartDur * 60000);
                            
                            if (new Date() < transitionTime) currentZone = isBodyFirst ? 'bed' : 'chair';
                            else currentZone = isBodyFirst ? 'chair' : 'bed';
                        } else if (svcConfig.type === 'foot') currentZone = 'chair';
                        else currentZone = 'bed';

                        return { ...b, id: i, start, end, status, svcConfig, currentZone, transitionTime };
                    });

                    // Process Staff
                    const processedStaff = rawStaff.map(s => {
                        // Check lịch nghỉ
                        const isOff = schedule.some(sch => sch.staffId === s.id); // Cần logic check ngày chính xác hơn (ở đây demo)
                        // Check đang làm
                        const job = processedBookings.find(b => b.staffId === s.id && b.status === 'active');
                        
                        let st = 'ready';
                        if (isOff) st = 'off';
                        else if (job) st = job.customerName === 'Staff Action' ? 'break' : 'working';
                        
                        return { ...s, status: st, currentJob: job };
                    });
                    
                    // Auto Sort Staff (Ready -> Working -> Off)
                    processedStaff.sort((a,b) => {
                        const score = { 'ready': 0, 'working': 1, 'break': 2, 'off': 3 };
                        return score[a.status] - score[b.status];
                    });

                    setBookings(processedBookings);
                    setStaffList(processedStaff);

                } catch (e) { console.error(e); }
            };

            useEffect(() => { fetchData(); const t = setInterval(()=>{ setNow(new Date()); fetchData(); }, 15000); return () => clearInterval(t); }, []);

            // --- 2. LOGIC TÌM GIỜ SỚM NHẤT ---
            const findEarliest = () => {
                const svc = SERVICES.find(s => s.id === searchParams.svcId);
                let checkTime = new Date();
                checkTime.setMinutes(Math.ceil(checkTime.getMinutes()/15)*15); // Làm tròn 15p
                
                // Quét 20 slot tiếp theo (5 tiếng)
                for(let i=0; i<20; i++) {
                    const slotStart = new Date(checkTime.getTime() + i*15*60000);
                    const slotEnd = new Date(slotStart.getTime() + svc.time * 60000);
                    
                    // Đếm thợ rảnh tại giờ đó
                    const freeStaff = staffList.filter(s => {
                        if (s.status === 'off') return false;
                        // Check booking trùng
                        const busy = bookings.some(b => b.staffId === s.id && !(b.end <= slotStart || b.start >= slotEnd));
                        return !busy;
                    }).length;

                    if (freeStaff >= searchParams.pax) {
                        setSearchRes(formatTime(slotStart));
                        return;
                    }
                }
                setSearchRes("Full");
            };

            // --- 3. XỬ LÝ FORM ---
            const updateGuestCount = (n) => {
                const count = parseInt(n);
                setForm(prev => {
                    const newGuests = [...prev.guests];
                    if (count > newGuests.length) {
                        for(let i=newGuests.length; i<count; i++) newGuests.push({ id: i+1, svcId: 'set_A', staffId: '', isBodyFirst: false, isOil: false });
                    } else {
                        newGuests.length = count;
                    }
                    return { ...prev, pax: count, guests: newGuests };
                });
            };

            const submitBooking = async () => {
                if(!form.name) return alert("請輸入姓名 (Nhập tên)!");
                setLoading(true);
                try {
                    // Gửi từng khách
                    for(const g of form.guests) {
                        const svc = SERVICES.find(s => s.id === g.svcId);
                        let svName = svc.name;
                        if(g.isBodyFirst) svName += " (身先)";
                        if(g.isOil) svName += " (油推)";
                        
                        // Check conflict frontend (đơn giản)
                        // ...

                        await axios.post('/api/admin-booking', {
                            ngayDen: form.date, gioDen: form.time,
                            dichVu: svName, nhanVien: g.staffId || '隨機',
                            sdt: form.phone, hoTen: `${form.name} (${g.id}/${form.pax})`,
                            pax: 1, isOil: g.isOil
                        });
                    }
                    alert("✅ Đặt thành công!");
                    setIsAddModal(false);
                    fetchData();
                } catch(e) { alert("Lỗi kết nối!"); }
                setLoading(false);
            };

            const updateStatus = async (id, status) => {
                if(!confirm("Xác nhận?")) return;
                await axios.post('/api/update-status', { rowId: id, status });
                fetchData();
            };

            // --- UI HELPER ---
            const StaffCard = ({ s }) => (
                <div onClick={()=>setStaffActionModal(s)} className={`p-2 mb-2 rounded border-l-4 shadow-sm flex justify-between items-center cursor-pointer bg-white hover:bg-slate-50 ${s.gender==='F'||s.gender==='女'?'border-pink-400':'border-blue-400'}`}>
                    <div className="flex items-center gap-2">
                        <div className={`w-8 h-8 rounded-full flex items-center justify-center text-white text-xs font-bold ${s.status==='working'?'bg-red-500':s.status==='off'?'bg-gray-400':'bg-green-500'}`}>{s.name.replace('號','')}</div>
                        <div>
                            <div className="font-bold text-sm text-slate-700">{s.name}</div>
                            <div className="text-[10px] text-slate-500">{s.status==='working'?'忙碌':s.status==='off'?'休假':'待命'}</div>
                        </div>
                    </div>
                    {s.status==='working' && <div className="text-[10px] text-red-500 font-mono">{formatTime(s.currentJob?.endTimeFull)} 完</div>}
                </div>
            );

            // Thẻ Tài Nguyên (Ghế/Giường)
            const ResourceCard = ({ res, type }) => {
                // Tìm khách đang ở vị trí này (logic giả lập dựa trên index, thực tế cần resourceId chính xác)
                const idx = parseInt(res.id.split('_')[1]) - 1;
                // Logic hiển thị: tìm booking đang active, có loại dịch vụ khớp với vùng này
                const active = bookings.find(b => {
                    // Nếu là combo, check currentZone
                    if (b.svcConfig.type === 'combo') return b.currentZone === type && (b.id % 6 === idx) && b.status === 'active';
                    // Nếu đơn lẻ
                    return b.svcConfig.type === type && (b.id % 6 === idx) && b.status === 'active';
                });

                // Check sắp có khách
                const incoming = !active && bookings.find(b => b.status === 'scheduled' && (b.start - now < 30*60000));

                let bg = 'bg-white'; let border = 'border-green-400'; let status = '空 (Free)';
                if (active) { bg = 'bg-red-50'; border = 'border-red-500'; status = '中 (Busy)'; }
                else if (incoming) { bg = 'bg-yellow-50'; border = 'border-yellow-400'; status = '預 (Soon)'; }

                return (
                    <div className={`p-2 rounded-xl border-2 h-32 flex flex-col justify-between shadow-sm relative ${bg} ${border}`} onClick={()=>!active && setIsAddModal(true)}>
                        <div className="flex justify-between">
                            <span className="font-bold text-slate-600">{res.name}</span>
                            <span className={`text-[10px] px-1 rounded text-white ${active?'bg-red-500':incoming?'bg-yellow-500':'bg-green-500'}`}>{status}</span>
                        </div>
                        {active ? (
                            <div className="text-xs">
                                <div className="font-bold truncate">{active.customerName}</div>
                                <div className="text-[10px] text-slate-500">{active.serviceName.split('(')[0]}</div>
                                {active.transitionTime && (
                                    <div className="bg-blue-100 text-blue-800 px-1 rounded mt-1 text-[9px]">
                                        轉: {formatTime(active.transitionTime)}
                                    </div>
                                )}
                                <div className="mt-2 flex gap-1">
                                    <button onClick={(e)=>{e.stopPropagation(); updateStatus(active.rowId, 'Done')}} className="bg-green-600 text-white px-2 py-1 rounded flex-1">完</button>
                                    <button onClick={(e)=>{e.stopPropagation(); updateStatus(active.rowId, 'Cancel')}} className="bg-gray-400 text-white px-2 py-1 rounded">X</button>
                                </div>
                            </div>
                        ) : (
                            <div className="flex justify-center items-center h-full text-slate-300">
                                {type==='chair' ? <Armchair size={32}/> : <Bed size={32}/>}
                            </div>
                        )}
                    </div>
                )
            };

            return (
                <div className="flex flex-col h-screen bg-slate-100">
                    {/* TOP BAR */}
                    <div className="bg-slate-900 text-white p-2 flex justify-between items-center shadow z-50 shrink-0">
                        <div className="font-bold flex items-center gap-2">🌿 POS <span className="bg-slate-700 px-2 rounded text-xs">{bookings.length} 張單</span></div>
                        
                        {/* Smart Search */}
                        <div className="flex bg-slate-800 rounded p-1 gap-1 items-center">
                            <select className="bg-slate-700 text-xs rounded p-1 w-20" value={searchParams.svcId} onChange={e=>setSearchParams({...searchParams, svcId:e.target.value})}>{SERVICES.map(s=><option value={s.id}>{s.name.substr(0,4)}</option>)}</select>
                            <select className="bg-slate-700 text-xs rounded p-1" value={searchParams.pax} onChange={e=>setSearchParams({...searchParams, pax:parseInt(e.target.value)})}>{[1,2,3,4].map(n=><option value={n}>{n}人</option>)}</select>
                            <button onClick={findEarliest} className="bg-blue-600 px-2 py-1 rounded text-xs">查</button>
                            <span className="text-amber-400 text-xs font-mono px-1">{searchRes || '--:--'}</span>
                        </div>

                        <button onClick={()=>setIsAddModal(true)} className="bg-amber-500 text-black px-3 py-1 rounded font-bold text-xs flex items-center gap-1"><Plus size={14}/> 新增</button>
                    </div>

                    <div className="flex-1 flex overflow-hidden p-2 gap-2">
                        {/* LEFT: STAFF */}
                        <div className="w-48 bg-white rounded-lg shadow border flex flex-col overflow-hidden shrink-0">
                            <div className="p-2 bg-slate-100 text-xs font-bold border-b text-center">技師列表 (Staff)</div>
                            <div className="flex-1 overflow-y-auto p-2 space-y-1">
                                {staffList.map(s => <StaffCard key={s.id} s={s} />)}
                            </div>
                        </div>

                        {/* RIGHT: ROOMS */}
                        <div className="flex-1 overflow-y-auto space-y-4 pr-1">
                            {/* Foot */}
                            <div className="bg-white p-3 rounded-lg shadow">
                                <div className="text-xs font-bold text-slate-500 mb-2 flex gap-1"><Armchair size={14}/> 足浴區</div>
                                <div className="grid grid-cols-3 lg:grid-cols-6 gap-2">
                                    {RESOURCES.chair.map(r => <ResourceCard key={r.id} res={r} type="chair"/>)}
                                </div>
                            </div>
                            {/* Body */}
                            <div className="bg-white p-3 rounded-lg shadow">
                                <div className="text-xs font-bold text-slate-500 mb-2 flex gap-1"><Bed size={14}/> 身體區</div>
                                <div className="grid grid-cols-3 lg:grid-cols-6 gap-2">
                                    {RESOURCES.bed.map(r => <ResourceCard key={r.id} res={r} type="bed"/>)}
                                </div>
                            </div>
                            {/* List */}
                            <div className="bg-white p-3 rounded-lg shadow">
                                <div className="text-xs font-bold text-slate-500 mb-2">📋 列表</div>
                                <div className="space-y-1">
                                    {bookings.map(b => (
                                        <div key={b.id} className="flex justify-between text-xs border-b pb-1">
                                            <span className="font-mono text-green-700">{formatTime(b.startTimeFull)}</span>
                                            <span className="font-bold">{b.customerName}</span>
                                            <span>{b.serviceName.substr(0,5)}..</span>
                                            <span className="bg-slate-100 px-1">{b.staffId}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* MODAL ADD (GROUP + OIL) */}
                    {isAddModal && (
                        <div className="fixed inset-0 bg-black/70 z-[99] flex items-center justify-center p-2">
                            <div className="bg-white rounded-xl w-full max-w-lg p-0 overflow-hidden flex flex-col max-h-[90vh]">
                                <div className="bg-slate-800 p-3 text-white flex justify-between items-center">
                                    <h3 className="font-bold">新增預約</h3>
                                    <button onClick={()=>setIsAddModal(false)}><X size={20}/></button>
                                </div>
                                <div className="p-4 overflow-y-auto space-y-3 flex-1">
                                    <div className="grid grid-cols-2 gap-2">
                                        <input className="border p-2 rounded text-sm" placeholder="Name" value={form.name} onChange={e=>setForm({...form, name:e.target.value})}/>
                                        <input className="border p-2 rounded text-sm" placeholder="Phone" value={form.phone} onChange={e=>setForm({...form, phone:e.target.value})}/>
                                        <input type="date" className="border p-2 rounded text-sm" value={form.date} onChange={e=>setForm({...form, date:e.target.value})}/>
                                        <div className="flex gap-1">
                                            <input type="time" className="border p-2 rounded text-sm flex-1" value={form.time} onChange={e=>setForm({...form, time:e.target.value})}/>
                                            <select className="border p-2 rounded text-sm w-16 font-bold" value={form.pax} onChange={e=>updateGuestCount(e.target.value)}>
                                                {[1,2,3,4,5,6].map(n=><option value={n}>{n}人</option>)}
                                            </select>
                                        </div>
                                    </div>
                                    
                                    <hr className="border-dashed"/>
                                    
                                    {/* Guest List */}
                                    <div className="space-y-2">
                                        {form.guests.map((g, i) => {
                                            const svc = SERVICES.find(s => s.id === g.svcId);
                                            return (
                                            <div key={i} className="bg-slate-50 p-2 rounded border text-sm">
                                                <div className="font-bold text-slate-500 mb-1">客 {i+1}</div>
                                                <div className="flex gap-2 mb-2">
                                                    <select className="flex-1 border rounded p-1" value={g.svcId} onChange={e=>{
                                                        const ng = [...form.guests]; ng[i].svcId = e.target.value; setForm({...form, guests:ng});
                                                    }}>
                                                        {SERVICES.map(s=><option value={s.id}>{s.short} ${s.price}</option>)}
                                                    </select>
                                                    <select className="w-24 border rounded p-1" value={g.staffId} onChange={e=>{
                                                        const ng = [...form.guests]; ng[i].staffId = e.target.value; setForm({...form, guests:ng});
                                                    }}>
                                                        <option value="">隨機</option>
                                                        {staffList.filter(s=>s.status!=='off').map(s=><option value={s.id}>{s.name}</option>)}
                                                    </select>
                                                </div>
                                                <div className="flex gap-4 text-xs">
                                                    {svc.type === 'combo' && (
                                                        <label className="flex items-center gap-1 cursor-pointer">
                                                            <input type="checkbox" checked={g.isBodyFirst} onChange={e=>{
                                                                const ng = [...form.guests]; ng[i].isBodyFirst = e.target.checked; setForm({...form, guests:ng});
                                                            }} /> 先按身 (Body 1st)
                                                        </label>
                                                    )}
                                                    {svc.type !== 'foot' && (
                                                        <label className="flex items-center gap-1 cursor-pointer text-rose-600 font-bold">
                                                            <input type="checkbox" checked={g.isOil} onChange={e=>{
                                                                const ng = [...form.guests]; ng[i].isOil = e.target.checked; setForm({...form, guests:ng});
                                                            }} /> 油推 (+$200)
                                                        </label>
                                                    )}
                                                </div>
                                            </div>
                                        )})}
                                    </div>
                                </div>
                                <div className="p-3 bg-slate-100 text-right">
                                    <button onClick={submitBooking} disabled={loading} className="bg-emerald-600 text-white px-6 py-2 rounded font-bold shadow hover:bg-emerald-700">{loading?'Saving...':'確認'}</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
