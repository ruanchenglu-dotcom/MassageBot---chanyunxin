<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XinWuChan POS - Staff Queue</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.6.7/axios.min.js"></script>

    <style>
        body { font-family: 'Microsoft JhengHei', sans-serif; background-color: #f3f4f6; }
        .card-shadow { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); }
        .staff-card:hover { transform: translateY(-2px); transition: all 0.2s; }
        .female-border { border-left: 4px solid #F472B6; } /* Hồng */
        .male-border { border-left: 4px solid #60A5FA; }   /* Xanh */
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- HELPER: PARSE NGÀY 114 ---
        const parseDate114 = (str) => {
            if (!str) return new Date();
            try {
                const [d, t] = str.split(' ');
                const [y, m, day] = d.split('/');
                const [hh, mm] = t.split(':');
                return new Date(parseInt(y)+1911, parseInt(m)-1, parseInt(day), parseInt(hh), parseInt(mm));
            } catch (e) { return new Date(); }
        };

        const formatTime = (date) => date ? date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false }) : '--:--';

        // --- APP CHÍNH ---
        function App() {
            const [bookings, setBookings] = useState([]);
            const [staffList, setStaffList] = useState([]);
            const [loading, setLoading] = useState(true);
            const [currentTime, setCurrentTime] = useState(new Date());
            const [actionModal, setActionModal] = useState(null); // Modal thao tác thợ

            // 1. LẤY DỮ LIỆU
            const fetchData = async () => {
                try {
                    const res = await axios.get('/api/info');
                    const { bookings: apiBookings, staffList: apiStaff, schedule } = res.data;
                    const now = new Date();

                    // Xử lý Booking
                    const mappedBookings = apiBookings.map((b, idx) => {
                        const start = parseDate114(b.startTimeString);
                        const end = new Date(start.getTime() + b.duration * 60000);
                        return {
                            ...b, id: idx, startTimeFull: start, endTimeFull: end,
                            status: (now >= start && now <= end) ? 'active' : 'scheduled'
                        };
                    });
                    setBookings(mappedBookings);

                    // Xử lý Staff (Tính toán trạng thái)
                    const mappedStaff = apiStaff.map(s => {
                        // Check lịch nghỉ
                        const isOffToday = schedule.some(sch => sch.staffId === s.id); // (Cần logic check ngày chính xác hơn ở BE, tạm thời FE check đơn giản)
                        
                        // Check đang làm khách nào
                        const currentJob = mappedBookings.find(b => b.staffId === s.id && b.status === 'active');
                        
                        // Xác định trạng thái
                        let status = 'ready';
                        if (isOffToday) status = 'off';
                        if (currentJob) status = 'working';
                        // Nếu có đơn 'Staff Action' (Đi ăn/Về sớm)
                        if (currentJob && currentJob.customerName === 'Staff Action') status = 'break';

                        return { ...s, status, currentJob };
                    });
                    setStaffList(mappedStaff);
                    setLoading(false);

                } catch (err) { console.error(err); }
            };

            useEffect(() => {
                fetchData();
                const interval = setInterval(() => { setCurrentTime(new Date()); fetchData(); }, 15000);
                return () => clearInterval(interval);
            }, []);

            // 2. PHÂN LOẠI THỢ VÀO 3 CỘT
            const staffReady = staffList.filter(s => s.status === 'ready');
            const staffWorking = staffList.filter(s => s.status === 'working' || s.status === 'break');
            const staffOff = staffList.filter(s => s.status === 'off');

            // 3. XỬ LÝ THAO TÁC
            const handleStaffAction = async (action, duration) => {
                if(!actionModal) return;
                setLoading(true);
                try {
                    await axios.post('/api/admin-staff-action', { 
                        staffId: actionModal.id, 
                        action, duration 
                    });
                    alert("Đã cập nhật trạng thái!");
                    setActionModal(null);
                    fetchData();
                } catch(e) { alert("Lỗi!"); }
                setLoading(false);
            };

            // 4. GIAO DIỆN THẺ THỢ
            const StaffCard = ({ s }) => {
                const isFemale = (s.gender === 'F' || s.gender === '女');
                return (
                    <div onClick={() => setActionModal(s)} 
                         className={`staff-card bg-white p-3 mb-2 rounded-lg card-shadow cursor-pointer flex justify-between items-center ${isFemale ? 'female-border' : 'male-border'}`}>
                        <div className="flex items-center gap-3">
                            <div className={`w-10 h-10 rounded-full flex items-center justify-center font-bold text-white ${isFemale ? 'bg-pink-400' : 'bg-blue-400'}`}>
                                {s.name.replace('號','')}
                            </div>
                            <div>
                                <div className="font-bold text-lg text-slate-800">{s.name}</div>
                                <div className="text-xs text-slate-500">{isFemale ? 'Nữ (女)' : 'Nam (男)'}</div>
                            </div>
                        </div>
                        
                        {s.status === 'working' && (
                            <div className="text-right">
                                <div className="text-xs font-bold text-red-500 animate-pulse">ĐANG LÀM</div>
                                <div className="text-xs text-slate-600">~{formatTime(s.currentJob?.endTimeFull)} Xong</div>
                            </div>
                        )}
                         {s.status === 'break' && (
                            <div className="text-right">
                                <div className="text-xs font-bold text-amber-600">ĐANG NGHỈ</div>
                                <div className="text-xs text-slate-600">{s.currentJob?.dichVu}</div>
                            </div>
                        )}
                    </div>
                )
            };

            return (
                <div className="min-h-screen flex flex-col">
                    {/* HEADER */}
                    <header className="bg-slate-800 text-white p-4 shadow-lg flex justify-between items-center sticky top-0 z-50">
                        <div className="flex items-center gap-2">
                            <h1 className="font-bold text-xl">💆 Bảng Xếp Tài (Staff Queue)</h1>
                            <span className="bg-green-500 px-2 py-0.5 rounded text-xs">Online</span>
                        </div>
                        <button onClick={fetchData} className="bg-slate-700 hover:bg-slate-600 p-2 rounded-full">🔄</button>
                    </header>

                    {/* MAIN CONTENT: 3 CỘT */}
                    <main className="flex-1 overflow-hidden p-4 flex gap-4 overflow-x-auto">
                        
                        {/* CỘT 1: ĐANG CHỜ (QUAN TRỌNG NHẤT) */}
                        <div className="flex-1 min-w-[280px] flex flex-col bg-green-50/50 rounded-xl border border-green-200">
                            <div className="p-3 bg-green-100 rounded-t-xl font-bold text-green-800 flex justify-between">
                                <span>🟢 Đang chờ (Ready)</span>
                                <span className="bg-white px-2 rounded-full text-xs py-1">{staffReady.length}</span>
                            </div>
                            <div className="flex-1 overflow-y-auto p-3">
                                {staffReady.length === 0 && <div className="text-center text-slate-400 mt-10">Không có ai rảnh</div>}
                                {staffReady.map(s => <StaffCard key={s.id} s={s} />)}
                            </div>
                        </div>

                        {/* CỘT 2: ĐANG LÀM */}
                        <div className="flex-1 min-w-[280px] flex flex-col bg-red-50/50 rounded-xl border border-red-200">
                            <div className="p-3 bg-red-100 rounded-t-xl font-bold text-red-800 flex justify-between">
                                <span>🔴 Đang làm (Working)</span>
                                <span className="bg-white px-2 rounded-full text-xs py-1">{staffWorking.length}</span>
                            </div>
                            <div className="flex-1 overflow-y-auto p-3">
                                {staffWorking.map(s => <StaffCard key={s.id} s={s} />)}
                            </div>
                        </div>

                        {/* CỘT 3: NGHỈ / CHƯA ĐẾN */}
                        <div className="flex-1 min-w-[280px] flex flex-col bg-slate-100 rounded-xl border border-slate-300 opacity-80">
                            <div className="p-3 bg-slate-200 rounded-t-xl font-bold text-slate-600 flex justify-between">
                                <span>⚫ Nghỉ / Chưa đến (Off)</span>
                                <span className="bg-white px-2 rounded-full text-xs py-1">{staffOff.length}</span>
                            </div>
                            <div className="flex-1 overflow-y-auto p-3">
                                {staffOff.map(s => <StaffCard key={s.id} s={s} />)}
                            </div>
                        </div>

                    </main>

                    {/* MODAL THAO TÁC */}
                    {actionModal && (
                        <div className="fixed inset-0 bg-black/70 z-[100] flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-sm rounded-xl shadow-2xl overflow-hidden">
                                <div className="bg-slate-800 p-4 text-white flex justify-between items-center">
                                    <h3 className="font-bold text-lg">{actionModal.name} - {actionModal.gender === 'F' || actionModal.gender === '女' ? 'Nữ' : 'Nam'}</h3>
                                    <button onClick={()=>setActionModal(null)} className="text-2xl">&times;</button>
                                </div>
                                <div className="p-6 grid grid-cols-2 gap-4">
                                    <button onClick={() => handleStaffAction('break', 30)} className="p-4 bg-yellow-100 text-yellow-800 rounded-lg font-bold hover:bg-yellow-200 flex flex-col items-center">
                                        <span className="text-2xl">🍱</span>
                                        <span>Đi ăn (30p)</span>
                                    </button>
                                    <button onClick={() => handleStaffAction('leave', 0)} className="p-4 bg-red-100 text-red-800 rounded-lg font-bold hover:bg-red-200 flex flex-col items-center">
                                        <span className="text-2xl">🏠</span>
                                        <span>Về sớm</span>
                                    </button>
                                    <button className="p-4 bg-gray-100 text-gray-600 rounded-lg font-bold hover:bg-gray-200 flex flex-col items-center col-span-2" onClick={()=>setActionModal(null)}>
                                        Quay lại
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
