<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Massage POS - Manager</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.6.7/axios.min.js"></script>

    <style>
        body { font-family: 'Microsoft JhengHei', sans-serif; background-color: #f8fafc; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        
        /* Hiệu ứng chuyển động */
        .transition-all { transition-property: all; transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); transition-duration: 300ms; }
        
        /* Card nhân viên */
        .staff-card {
            min-width: 90px; height: 110px;
            transition: transform 0.2s;
        }
        .staff-card:active { transform: scale(0.95); }
        
        /* Modal quản lý */
        .modal-animate { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* Switch Toggle Design */
        .toggle-checkbox:checked { right: 0; border-color: #10B981; }
        .toggle-checkbox:checked + .toggle-label { background-color: #10B981; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- ICON ---
        const Icon = ({ d, size=20, className="" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d={d} /></svg>
        );
        const PATHS = {
            Grid: "M3 3h7v7H3zM14 3h7v7h-7zM14 14h7v7h-7zM3 14h7v7H3z",
            Users: "M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M9 7a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75",
            Clock: "M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10zM12 6v6l4 2",
            Settings: "M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.18-.08a2 2 0 0 0-2 0l-.45.45a2 2 0 0 0 0 2l.08.18a2 2 0 0 1 0 2l-.25.43a2 2 0 0 1-1.73 1H2a2 2 0 0 0-2 2v.44a2 2 0 0 0 2 2h.18a2 2 0 0 1 1.73 1l.25.43a2 2 0 0 1 0 2l-.08.18a2 2 0 0 0 0 2l.45.45a2 2 0 0 0 2 0l.18-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.18.08a2 2 0 0 0 2 0l.45-.45a2 2 0 0 0 0-2l-.08-.18a2 2 0 0 1 0-2l.25-.43a2 2 0 0 1 1.73-1H22a2 2 0 0 0 2-2v-.44a2 2 0 0 0-2-2h-.18a2 2 0 0 1-1.73-1l-.25-.43a2 2 0 0 1 0-2l.08-.18a2 2 0 0 0 0-2l-.45-.45a2 2 0 0 0-2 0l-.18.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z",
            X: "M18 6 6 18M6 6l12 12",
            Check: "M20 6 9 17 4 12",
            Refresh: "M23 4v6h-6M1 20v-6h6"
        };

        // --- COMPONENTS ---

        // 1. MODAL QUẢN LÝ NHÂN VIÊN (GIỐNG HÌNH BẠN GỬI)
        const StaffManagementModal = ({ staffList, checkInState, setCheckInState, onClose }) => {
            const handleToggle = (id) => {
                const newState = { ...checkInState, [id]: !checkInState[id] };
                setCheckInState(newState);
                localStorage.setItem('staff_checkin_state', JSON.stringify(newState));
            };

            return (
                <div className="fixed inset-0 bg-black/60 z-[60] flex items-center justify-center p-4 backdrop-blur-sm">
                    <div className="bg-white w-full max-w-2xl rounded-2xl shadow-2xl modal-animate flex flex-col max-h-[90vh]">
                        {/* Header */}
                        <div className="p-4 bg-purple-700 text-white rounded-t-2xl flex justify-between items-center shrink-0">
                            <h2 className="text-lg font-bold flex gap-2 items-center"><Icon d={PATHS.Users}/> 技師排班管理 (Quản lý Check-in)</h2>
                            <button onClick={onClose} className="p-1 hover:bg-purple-600 rounded-full"><Icon d={PATHS.X}/></button>
                        </div>

                        {/* Table Header */}
                        <div className="grid grid-cols-4 gap-2 p-3 bg-purple-50 font-bold text-purple-900 text-sm border-b shrink-0">
                            <div className="pl-4">技師 (Thợ)</div>
                            <div className="text-center">上班 (Bắt đầu)</div>
                            <div className="text-center">下班 (Kết thúc)</div>
                            <div className="text-center">狀態 (Trạng thái)</div>
                        </div>

                        {/* Scrollable List */}
                        <div className="overflow-y-auto flex-1 p-2 space-y-2">
                            {staffList.map(s => (
                                <div key={s.id} className="grid grid-cols-4 gap-2 items-center p-2 bg-white border rounded-lg hover:shadow-md transition-all">
                                    <div className="flex items-center gap-3 pl-2">
                                        <div className={`w-8 h-8 rounded-full flex items-center justify-center font-bold text-white text-xs ${checkInState[s.id] ? 'bg-purple-600' : 'bg-gray-300'}`}>
                                            {s.id.replace('號','')}
                                        </div>
                                        <span className="font-bold text-gray-700">{s.name}</span>
                                    </div>
                                    
                                    <div className="flex justify-center">
                                        <input type="time" defaultValue="10:00" className="border rounded px-2 py-1 text-sm bg-gray-50 focus:ring-2 ring-purple-500 outline-none w-24 text-center"/>
                                    </div>
                                    <div className="flex justify-center">
                                        <input type="time" defaultValue="02:00" className="border rounded px-2 py-1 text-sm bg-gray-50 focus:ring-2 ring-purple-500 outline-none w-24 text-center"/>
                                    </div>

                                    <div className="flex justify-center">
                                        <button 
                                            onClick={() => handleToggle(s.id)}
                                            className={`flex items-center gap-1 px-4 py-1.5 rounded-full text-xs font-bold transition-all ${checkInState[s.id] 
                                                ? 'bg-emerald-100 text-emerald-700 border border-emerald-300 shadow-sm' 
                                                : 'bg-gray-100 text-gray-400 border border-gray-200'}`}
                                        >
                                            <div className={`w-2 h-2 rounded-full ${checkInState[s.id] ? 'bg-emerald-500 animate-pulse' : 'bg-gray-400'}`}></div>
                                            {checkInState[s.id] ? '在店 (Ready)' : '未到 (Away)'}
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>

                        {/* Footer */}
                        <div className="p-4 border-t bg-gray-50 rounded-b-2xl flex justify-end">
                            <button onClick={onClose} className="bg-purple-600 hover:bg-purple-700 text-white px-6 py-2 rounded-lg font-bold shadow-lg transform active:scale-95 transition-all">
                                完成 (Xong)
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- MAIN APP ---
        function App() {
            const [staffList, setStaffList] = useState([]);
            const [bookings, setBookings] = useState([]);
            const [loading, setLoading] = useState(true);
            const [showManager, setShowManager] = useState(false);
            
            // State Check-in: Lấy từ LocalStorage hoặc mặc định là false
            const [checkInState, setCheckInState] = useState(() => {
                const saved = localStorage.getItem('staff_checkin_state');
                return saved ? JSON.parse(saved) : {};
            });

            const fetchData = async () => {
                try {
                    const res = await axios.get('/api/info');
                    const { bookings: apiBookings, staffList: apiStaff } = res.data;
                    
                    // Xử lý booking
                    const mappedBookings = apiBookings.map((b, idx) => ({ ...b, id: idx, status: (b.status && b.status.includes('取消')) ? 'cancelled' : 'active' }));
                    setBookings(mappedBookings);

                    // Xử lý Staff
                    const mappedStaff = apiStaff.map(s => {
                        // Logic trạng thái cũ vẫn giữ để tham khảo
                        const currentJob = mappedBookings.find(b => b.staffId === s.id && b.status === 'active'); // Đơn giản hóa logic check busy
                        return { ...s, currentJob };
                    });
                    
                    // Sắp xếp theo số thứ tự
                    mappedStaff.sort((a,b) => parseInt(a.id.replace(/\D/g,'')) - parseInt(b.id.replace(/\D/g,'')));
                    setStaffList(mappedStaff);
                    setLoading(false);
                } catch (e) { console.error(e); setLoading(false); }
            };

            useEffect(() => { fetchData(); const t = setInterval(fetchData, 10000); return () => clearInterval(t); }, []);

            // --- RENDER THẺ NHÂN VIÊN (GIAO DIỆN CHÍNH) ---
            const StaffCard = ({ s }) => {
                const isFemale = s.gender === 'F' || s.gender === '女';
                const isCheckedIn = checkInState[s.id]; // Kiểm tra xem đã Check-in chưa?

                let stClass = 'bg-gray-300'; 
                let stText = '未到 (Away)';
                let cardOpacity = 'opacity-50 grayscale'; // Mặc định mờ đi

                if (isCheckedIn) {
                    cardOpacity = 'opacity-100'; // Sáng lên
                    stClass = 'bg-emerald-500'; 
                    stText = 'Ready';
                    
                    // Nếu đang có khách (Logic từ API)
                    // (Tạm thời check đơn giản: nếu tên có trong danh sách đặt)
                    const isBusy = bookings.some(b => b.staffId === s.id && b.status !== 'cancelled');
                    if (isBusy) {
                        stClass = 'bg-red-500';
                        stText = 'Busy';
                    }
                }

                return (
                    <div className={`staff-card shrink-0 rounded-lg shadow border bg-white flex flex-col justify-between overflow-hidden relative select-none ${cardOpacity} ${isFemale ? 'border-b-4 border-pink-300' : 'border-b-4 border-blue-300'}`}>
                        <div className={`h-1.5 w-full ${stClass}`}></div>
                        <div className="flex-1 flex flex-col items-center justify-center p-1">
                            <div className="font-black text-2xl text-slate-800">{s.name.replace('號','')}</div>
                            <div className="text-[10px] font-bold text-slate-400">{isFemale?'女':'男'}</div>
                        </div>
                        <div className={`text-center text-[10px] text-white font-bold py-1 w-full ${stClass}`}>
                            {stText}
                        </div>
                    </div>
                )
            };

            return (
                <div className="min-h-screen flex flex-col bg-slate-100">
                    {/* Header */}
                    <header className="bg-slate-900 text-white p-3 shadow-lg flex justify-between items-center sticky top-0 z-50">
                        <div className="font-bold flex gap-2 items-center px-2 text-lg">
                            <span className="bg-amber-500 text-black px-2 rounded text-sm">POS</span>
                            <span>XinWuChan</span>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={fetchData} className="p-2 hover:bg-slate-700 rounded-full transition-colors"><Icon d={PATHS.Refresh}/></button>
                            
                            {/* NÚT MỞ BẢNG QUẢN LÝ (MỚI) */}
                            <button onClick={() => setShowManager(true)} className="bg-purple-600 hover:bg-purple-500 text-white px-3 py-1.5 rounded-lg font-bold flex gap-2 text-sm items-center shadow border border-purple-400 transition-transform active:scale-95">
                                <Icon d={PATHS.Settings} size={16}/> 技師排班 (QL Thợ)
                            </button>
                        </div>
                    </header>

                    {/* STAFF RAIL (THANH NHÂN VIÊN) */}
                    <div className="bg-white border-b shadow-sm overflow-x-auto flex gap-3 p-4 shrink-0 h-40 items-center">
                        {loading ? <div className="text-gray-400 w-full text-center">Loading staff...</div> : staffList.map(s => <StaffCard key={s.id} s={s} />)}
                    </div>

                    {/* CONTENT DƯỚI (DANH SÁCH ĐẶT LỊCH) */}
                    <main className="flex-1 p-3 overflow-y-auto">
                        <div className="bg-white rounded-xl shadow border border-slate-200 overflow-hidden">
                            <div className="p-3 bg-slate-50 border-b font-bold text-slate-700 flex gap-2 items-center">
                                <Icon d={PATHS.Clock} /> Danh sách đặt lịch hôm nay
                            </div>
                            <table className="w-full text-sm text-left">
                                <thead className="bg-slate-100 text-slate-500">
                                    <tr>
                                        <th className="p-3">Time</th>
                                        <th className="p-3">Name</th>
                                        <th className="p-3">Svc</th>
                                        <th className="p-3">Staff</th>
                                        <th className="p-3">Status</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y">
                                    {bookings.map((b, i) => (
                                        <tr key={i} className="hover:bg-slate-50">
                                            <td className="p-3 font-mono font-bold text-emerald-700">{b.time}</td>
                                            <td className="p-3 font-bold">{b.customerName}</td>
                                            <td className="p-3 text-gray-600">{b.serviceName.split('(')[0]}</td>
                                            <td className="p-3"><span className="bg-slate-200 px-2 py-0.5 rounded text-xs font-bold">{b.staffId}</span></td>
                                            <td className="p-3">
                                                <span className={`px-2 py-1 rounded text-xs font-bold ${b.status === 'cancelled' ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-600'}`}>
                                                    {b.status}
                                                </span>
                                            </td>
                                        </tr>
                                    ))}
                                    {bookings.length === 0 && <tr><td colSpan="5" className="p-8 text-center text-gray-400">Chưa có lịch đặt nào</td></tr>}
                                </tbody>
                            </table>
                        </div>
                    </main>

                    {/* HIỂN THỊ MODAL NẾU BIẾN showManager = true */}
                    {showManager && (
                        <StaffManagementModal 
                            staffList={staffList} 
                            checkInState={checkInState} 
                            setCheckInState={setCheckInState}
                            onClose={() => setShowManager(false)} 
                        />
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
