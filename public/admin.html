<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Massage POS - Full Admin</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.6.7/axios.min.js"></script>

    <style>
        body { font-family: 'Microsoft JhengHei', sans-serif; background-color: #f0f2f5; user-select: none; }
        .modal-animate { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .res-card { transition: all 0.2s; position: relative; border-radius: 12px; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; flex-direction: column; overflow: hidden; }
        .res-empty { border: 2px dashed #CBD5E1; background: #F8FAFC; color: #94A3B8; align-items: center; justify-content: center; }
        .res-running { border: 2px solid #EF4444; background: #FEF2F2; }
        .res-paused  { border: 2px solid #F97316; background: #FFEDD5; }
        .res-waiting { border: 2px solid #EAB308; background: #FEFCE8; animation: pulse-border 2s infinite; }
        @keyframes pulse-border { 0% { border-color: #EAB308; } 50% { border-color: #FDE047; } 100% { border-color: #EAB308; } }
        .card-3d { transition: all 0.1s; position: relative; width: 90px; height: 110px; border-radius: 12px; display: flex; flex-direction: column; cursor: pointer; background: white; margin-right: 8px; flex-shrink: 0; }
        .card-3d:active { transform: translateY(4px); }
        .style-female { border: 2px solid #F472B6; border-bottom: 5px solid #DB2777; color: #BE185D; }
        .style-male { border: 2px solid #3B82F6; border-bottom: 5px solid #2563EB; color: #1E3A8A; }
        .st-busy { background: #FEF2F2; border-color: #EF4444 !important; border-bottom-color: #B91C1C !important; color: #B91C1C !important; }
        .st-booked { background: #FFFBEB; border-color: #F59E0B !important; border-bottom-color: #B45309 !important; color: #B45309 !important; }
        .st-away { background: #E5E7EB; opacity: 0.6; }
        .btn-tool { display: flex; align-items: center; justify-content: center; padding: 6px; border-radius: 6px; font-weight: bold; font-size: 11px; color: white; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const Icon = ({ d, size=16 }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d={d} /></svg>);
        const PATHS = { 
            Grid: "M3 3h7v7H3zM14 3h7v7h-7zM14 14h7v7h-7zM3 14h7v7H3z", 
            List: "M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01", 
            Plus: "M12 5v14M5 12h14", X: "M18 6 6 18M6 6l12 12",
            Refresh: "M23 4v6h-6M1 20v-6h6", Play: "M5 3l14 9-14 9V3z", Pause: "M6 4h4v16H6zm8 0h4v16h-4z", Stop: "M6 6h12v12H6z", 
            Trash: "M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2",
            Edit: "M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7",
            Check: "M20 6 9 17 4 12"
        };

        const formatDate = (d) => { if(!d) return ''; const date = new Date(d); return `${date.getFullYear()}/${(date.getMonth()+1).toString().padStart(2,'0')}/${date.getDate().toString().padStart(2,'0')}`; };
        const getTodayStr = () => formatDate(new Date().toLocaleString('en-US', { timeZone: 'Asia/Taipei' }));
        const addMinutes = (iso, m) => { if(!iso) return ''; const d = new Date(iso); d.setMinutes(d.getMinutes() + m); return d.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit', hour12:false }); };
        const formatTime = (iso) => { if(!iso) return '--:--'; return new Date(iso).toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit', hour12:false }); };

        // COMPONENT: MODAL
        const BookingModal = ({ isOpen, onClose, services, staffList, initialData, isEditMode }) => {
            if (!isOpen) return null;
            const [formData, setFormData] = useState({ name: '', phone: '', time: '12:00', serviceKey: '', staffId: '隨機', isOil: false });

            useEffect(() => {
                if (initialData && isEditMode) {
                    setFormData({ name: initialData.customerName, phone: '', time: initialData.time, serviceKey: '', staffId: initialData.staffId, isOil: false });
                } else {
                    setFormData({ name: '', phone: '', time: '12:00', serviceKey: Object.keys(services)[0] || '', staffId: '隨機', isOil: false });
                }
            }, [initialData, isEditMode, services]);

            const handleSubmit = async () => {
                try {
                    if (isEditMode) {
                        await axios.post('/api/booking/edit', { rowId: initialData.rowId, time: formData.time, staffId: formData.staffId });
                    } else {
                        const service = services[formData.serviceKey];
                        await axios.post('/api/booking/create', { date: getTodayStr(), time: formData.time, name: formData.name || 'Walk-in', phone: formData.phone || '0000', serviceName: service.name, isOil: formData.isOil, staffId: formData.staffId });
                    }
                    alert('Thành công!'); onClose();
                } catch (e) { alert('Lỗi: ' + e.message); }
            };

            return (
                <div className="fixed inset-0 bg-black/60 z-[80] flex items-center justify-center p-4">
                    <div className="bg-white w-full max-w-md rounded-xl shadow-2xl modal-animate flex flex-col overflow-hidden">
                        <div className="p-4 bg-indigo-600 text-white font-bold flex justify-between"><span>{isEditMode ? 'Sửa Đơn' : 'Tạo Đơn (Walk-in)'}</span><button onClick={onClose}><Icon d={PATHS.X}/></button></div>
                        <div className="p-4 space-y-4">
                            {!isEditMode && ( <> <div><label className="block text-xs font-bold text-gray-500 mb-1">Tên khách</label><input className="w-full border p-2 rounded" value={formData.name} onChange={e=>setFormData({...formData, name: e.target.value})} placeholder="Khách vãng lai" /></div> <div><label className="block text-xs font-bold text-gray-500 mb-1">Dịch vụ</label><select className="w-full border p-2 rounded" value={formData.serviceKey} onChange={e=>setFormData({...formData, serviceKey: e.target.value})}>{Object.keys(services).map(k => (<option key={k} value={k}>{services[k].name} - ${services[k].price}</option>))}</select></div> <div className="flex items-center gap-2"><input type="checkbox" checked={formData.isOil} onChange={e=>setFormData({...formData, isOil: e.target.checked})} /><label className="text-sm font-bold">Thêm Dầu (Oil) +$200</label></div> </> )}
                            <div className="grid grid-cols-2 gap-4"><div><label className="block text-xs font-bold text-gray-500 mb-1">Giờ</label><input type="time" className="w-full border p-2 rounded font-mono font-bold" value={formData.time} onChange={e=>setFormData({...formData, time: e.target.value})} /></div><div><label className="block text-xs font-bold text-gray-500 mb-1">Thợ</label><select className="w-full border p-2 rounded font-bold" value={formData.staffId} onChange={e=>setFormData({...formData, staffId: e.target.value})}><option value="隨機">隨機 (Random)</option>{staffList.filter(s=>s.status!=='off').map(s => (<option key={s.id} value={s.id}>{s.name}</option>))}</select></div></div>
                            <button onClick={handleSubmit} className="w-full bg-indigo-600 text-white font-bold py-3 rounded-lg hover:bg-indigo-700 shadow-lg mt-2">{isEditMode ? 'LƯU' : 'TẠO ĐƠN'}</button>
                        </div>
                    </div>
                </div>
            );
        };

        // COMPONENT: MAP
        const ResourceMap = ({ bookings, resourceState, onUpdate }) => {
            const [selectedRes, setSelectedRes] = useState(null);
            const handleAssign = (booking) => { const newState = { booking: booking, startTime: null, isRunning: false, isPaused: false }; onUpdate(selectedRes, newState, 'update'); setSelectedRes(null); };

            const ResourceCard = ({ type, index }) => {
                const id = `${type}-${index}`; const data = resourceState[id]; const isOccupied = !!data;
                let cardClass = isOccupied ? (data.isRunning && !data.isPaused ? 'res-running' : data.isPaused ? 'res-paused' : 'res-waiting') : 'res-empty hover:border-purple-400';
                
                return (
                    <div className={`res-card h-64 p-3 ${cardClass}`}>
                        <div className="flex justify-between items-center border-b pb-2 mb-2"><span className="font-bold uppercase text-xs text-gray-500">{type} {index}</span>{isOccupied && <span className="bg-white/80 text-[10px] px-2 py-0.5 rounded font-bold">{data.isRunning ? 'RUN' : 'WAIT'}</span>}</div>
                        {isOccupied ? ( <div className="flex flex-col h-full justify-between"><div><div className="font-black text-lg truncate">{data.booking.customerName.split('(')[0]}</div><div className="text-xs text-gray-500 truncate mb-2">{data.booking.serviceName.split('(')[0]}</div><div className="flex items-center gap-2 bg-white/60 py-1 rounded border border-gray-100"><div className="w-6 h-6 bg-indigo-100 text-indigo-700 rounded-full flex items-center justify-center font-bold text-xs">{data.booking.staffId.replace('號','')}</div><span className="text-xs font-bold text-gray-600">NV</span></div>{data.isRunning && (<div className="mt-2 grid grid-cols-2 gap-1 text-[10px] bg-white/50 p-1 rounded"><div className="text-center font-bold text-green-700">{formatTime(data.realStartTime)}</div><div className="text-center font-bold text-red-700">{addMinutes(data.startTime, data.booking.duration)}</div></div>)}</div><div className="grid grid-cols-2 gap-1 mt-2">{!data.isRunning ? (<button onClick={() => onUpdate(id, { ...data, startTime: new Date().toISOString(), realStartTime: new Date().toISOString(), isRunning: true, isPaused: false }, 'update')} className="col-span-2 btn-tool bg-green-600 hover:bg-green-700 py-2"><Icon d={PATHS.Play}/> START</button>) : (<><button onClick={() => onUpdate(id, { ...data, isPaused: !data.isPaused }, 'update')} className={`btn-tool ${data.isPaused?'bg-green-500':'bg-orange-500'}`}><Icon d={data.isPaused?PATHS.Play:PATHS.Pause}/></button><button onClick={() => { if(confirm('Done?')) onUpdate(id, null, 'delete'); }} className="btn-tool bg-slate-600"><Icon d={PATHS.Check}/></button></>)}<button onClick={() => { if(confirm('Clear?')) onUpdate(id, null, 'delete'); }} className="absolute top-1 right-1 text-gray-400 hover:text-red-500"><Icon d={PATHS.Trash} size={14}/></button></div></div> ) : (<button onClick={()=>setSelectedRes(id)} className="h-full flex flex-col items-center justify-center text-gray-300 hover:text-purple-600 group"><Icon d={PATHS.Plus} size={24}/><span className="text-[10px] font-bold mt-1">Xếp khách</span></button>)}
                    </div>
                );
            };

            return (
                <div className="space-y-4 pb-20">
                    <div className="bg-white p-4 rounded-2xl shadow-sm border border-emerald-100"><h3 className="font-bold text-emerald-700 mb-3 border-b pb-2">KHU VỰC CHÂN (FOOT)</h3><div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-3">{[1,2,3,4,5,6].map(i => <ResourceCard key={i} type="chair" index={i}/>)}</div></div>
                    <div className="bg-white p-4 rounded-2xl shadow-sm border border-purple-100"><h3 className="font-bold text-purple-700 mb-3 border-b pb-2">KHU VỰC GIƯỜNG (BODY)</h3><div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-3">{[1,2,3,4,5,6].map(i => <ResourceCard key={i} type="bed" index={i}/>)}</div></div>
                    {selectedRes && (<div className="fixed inset-0 bg-black/60 z-[70] flex items-center justify-center p-4"><div className="bg-white w-full max-w-sm rounded-xl shadow-2xl modal-animate flex flex-col max-h-[80vh]"><div className="p-3 border-b font-bold flex justify-between"><span>Chọn khách vào {selectedRes}</span><button onClick={()=>setSelectedRes(null)}><Icon d={PATHS.X}/></button></div><div className="overflow-y-auto p-2 space-y-2 bg-slate-50 flex-1">{bookings.filter(b => b.status === 'active' || b.status === '已預約').map((b, i) => (<div key={i} onClick={() => handleAssign(b)} className="p-3 bg-white border rounded hover:bg-blue-50 cursor-pointer flex justify-between items-center"><div><div className="font-bold">{b.customerName}</div><div className="text-xs text-gray-500">{b.serviceName} ({b.time})</div></div><span className="text-blue-600 font-bold text-xs border px-2 py-1 rounded">Chọn</span></div>))}{bookings.length === 0 && <div className="text-center text-gray-400 p-4">Không có khách chờ</div>}</div></div></div>)}
                </div>
            );
        };

        const StaffCard = ({ s, statusData, resourceState }) => {
            const isFemale = s.gender === 'F' || s.gender === '女'; const local = statusData[s.id] || { status: 'AWAY' }; 
            let displayStatus = local.status; let style = isFemale ? 'style-female' : 'style-male';
            const isActuallyBusy = Object.values(resourceState).some(r => r.isRunning && r.booking.staffId === s.id);
            if (isActuallyBusy) { displayStatus = 'BUSY'; style = 'st-busy'; } else if (s.activeBooking) { displayStatus = 'BOOKED'; style = 'st-booked'; } else if (displayStatus === 'AWAY') style = 'st-away';
            return ( <div className={`card-3d ${style}`}><div className="flex-1 flex flex-col items-center justify-center"><span className="text-2xl font-black">{s.id.replace('號','')}</span><span className="text-[10px] font-bold truncate">{s.name}</span></div><div className="text-[9px] font-bold text-center py-1 bg-black/5">{displayStatus}</div></div> );
        };

        // --- MAIN APP ---
        function App() {
            const [view, setView] = useState('map'); const [bookings, setBookings] = useState([]); const [staffList, setStaffList] = useState([]); const [services, setServices] = useState({}); const [resourceState, setResourceState] = useState({}); const [statusData, setStatusData] = useState({});
            const [isModalOpen, setIsModalOpen] = useState(false); const [editData, setEditData] = useState(null);

            const fetchData = async () => {
                try {
                    const res = await axios.get('/api/info'); const { bookings: apiBookings, staffList: apiStaff, schedule, resourceState: sRes, staffStatus: sStaff, services: sSvc } = res.data; 
                    const today = getTodayStr(); const todayBookings = apiBookings.filter(b => b.date && b.date.includes(today) && !b.status.includes('取消')).map((b,i) => ({...b, id: i, status: 'active'}));
                    setBookings(todayBookings);
                    const offIds = schedule.filter(s => s.date && s.date.includes(today)).map(s => s.staffId);
                    setStaffList(apiStaff.map(s => ({ ...s, status: offIds.includes(s.id) ? 'off' : 'ready', activeBooking: todayBookings.find(b=>b.staffId===s.id) })).sort((a,b)=>parseInt(a.id.replace(/\D/g,''))-parseInt(b.id.replace(/\D/g,''))));
                    setResourceState(sRes || {}); setStatusData(sStaff || {}); setServices(sSvc || {});
                } catch(e) { console.error(e); }
            };

            const updateResource = async (id, data, action) => { const temp = { ...resourceState }; if (action === 'delete') delete temp[id]; else temp[id] = data; setResourceState(temp); await axios.post('/api/resource-update', { resourceId: id, data, action }); };
            const openCreateModal = () => { setEditData(null); setIsModalOpen(true); };
            const openEditModal = (booking) => { setEditData(booking); setIsModalOpen(true); };

            useEffect(() => { fetchData(); const interval = setInterval(fetchData, 5000); return () => clearInterval(interval); }, []);
            const activeStaff = staffList.filter(s => s.status!=='off' && statusData[s.id]?.status !== 'AWAY').sort((a,b)=>(statusData[a.id]?.checkInTime||0)-(statusData[b.id]?.checkInTime||0));
            const awayStaff = staffList.filter(s => s.status!=='off' && (!statusData[s.id] || statusData[s.id]?.status === 'AWAY'));

            return (
                <div className="flex flex-col h-screen overflow-hidden">
                    <header className="bg-slate-900 text-white p-3 shadow-md flex justify-between items-center shrink-0 z-10"><div className="font-bold flex items-center gap-2"><span className="bg-amber-400 text-black px-2 rounded text-xs py-1">POS</span><span>XinWuChan</span></div><div className="flex gap-2"><button onClick={fetchData} className="p-2 bg-slate-800 rounded hover:bg-slate-700"><Icon d={PATHS.Refresh}/></button><button onClick={openCreateModal} className="bg-green-600 px-4 py-1.5 rounded font-bold text-sm flex items-center gap-2 hover:bg-green-500 shadow-lg border-b-2 border-green-800 active:border-b-0 active:translate-y-1 transition-all"><Icon d={PATHS.Plus}/> Tạo Đơn</button></div></header>
                    <div className="bg-white border-b p-2 overflow-x-auto shrink-0 shadow-sm z-0"><div className="flex min-w-max gap-4 px-2"><div className="flex gap-2 pr-4 border-r border-dashed border-gray-300">{awayStaff.map(s=><StaffCard key={s.id} s={s} statusData={statusData} resourceState={resourceState}/>)}</div><div className="flex flex-row-reverse gap-2">{activeStaff.map(s=><StaffCard key={s.id} s={s} statusData={statusData} resourceState={resourceState}/>)}</div></div></div>
                    <main className="flex-1 bg-slate-50 overflow-y-auto p-4 relative">
                        <div className="flex gap-2 mb-4 sticky top-0 z-10 bg-slate-50 py-2"><button onClick={()=>setView('map')} className={`px-4 py-2 rounded font-bold text-sm shadow flex items-center gap-2 ${view==='map'?'bg-slate-800 text-white':'bg-white text-gray-600'}`}><Icon d={PATHS.Grid}/> Sơ đồ</button><button onClick={()=>setView('list')} className={`px-4 py-2 rounded font-bold text-sm shadow flex items-center gap-2 ${view==='list'?'bg-slate-800 text-white':'bg-white text-gray-600'}`}><Icon d={PATHS.List}/> Danh sách</button></div>
                        {view === 'map' && <ResourceMap bookings={bookings} resourceState={resourceState} onUpdate={updateResource} staffList={staffList} />}
                        {view === 'list' && ( <div className="bg-white rounded shadow overflow-hidden"><table className="w-full text-sm"><thead className="bg-slate-100 text-slate-600 font-bold"><tr><th className="p-3 text-left">Giờ</th><th className="p-3 text-left">Khách</th><th className="p-3 text-left">Dịch vụ</th><th className="p-3">SĐT</th><th className="p-3">Thợ</th><th className="p-3 text-right">Sửa</th></tr></thead><tbody className="divide-y">{bookings.map((b,i)=>(<tr key={i} className="hover:bg-slate-50"><td className="p-3 font-mono font-bold text-indigo-700">{b.time}</td><td className="p-3 font-bold">{b.customerName.split('(')[0]}</td><td className="p-3 text-gray-500">{b.serviceName}</td><td className="p-3 text-center text-gray-400">{b.customerName.includes('(')?b.customerName.split('(')[1].replace(')',''):''}</td><td className="p-3 text-center"><span className="bg-indigo-50 text-indigo-700 px-2 py-1 rounded text-xs font-bold">{b.staffId}</span></td><td className="p-3 text-right"><button onClick={()=>openEditModal(b)} className="text-gray-400 hover:text-blue-600 p-1 border rounded hover:bg-blue-50"><Icon d={PATHS.Edit}/></button></td></tr>))}</tbody></table></div> )}
                    </main>
                    <BookingModal isOpen={isModalOpen} onClose={()=>setIsModalOpen(false)} services={services} staffList={staffList} initialData={editData} isEditMode={!!editData} />
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>
</html>
