                    });
                    setBillingData({ activeItem: { resourceId: id, booking: current.booking }, relatedItems: related });
                }
            };

            const executeStart = (id, comboSequence) => {
                const current = resourceState[id];
                let finalStaffId = current.booking.staffId;
                const reqStaff = finalStaffId;
                let currentId = id;
                let shouldMove = false;
                let targetMoveId = null;
                
                if (comboSequence) {
                    const currentType = id.split('-')[0];
                    if (comboSequence === 'BF' && currentType === 'chair') { shouldMove = true; for(let i=1; i<=6; i++) { if(!resourceState[`bed-${i}`]) { targetMoveId = `bed-${i}`; break; } } } 
                    else if (comboSequence === 'FB' && currentType === 'bed') { shouldMove = true; for(let i=1; i<=6; i++) { if(!resourceState[`chair-${i}`]) { targetMoveId = `chair-${i}`; break; } } }
                }
                if (shouldMove) { if (!targetMoveId) { alert("⚠️ 無法切換區域: 目標區域已滿!"); return; } currentId = targetMoveId; }
                
                if (['隨機', '男', '女', 'Oil'].some(k => reqStaff.includes(k))) {
                    const liveBusyStaffIds = Object.values(resourceState).filter(r => r.isRunning && !r.isPaused && r.booking.staffId !== '隨機').map(r => r.booking.staffId);
                    
                    const readyStaff = staffList.filter(s => { 
                        const stat = statusData[s.id]; 
                        if (!stat || stat.status !== 'READY') return false;
                        if (liveBusyStaffIds.includes(s.id)) return false;
                        return true;
                    });

                    let candidates = readyStaff;
                    if (reqStaff.includes('男') || reqStaff.includes('Male')) candidates = candidates.filter(s => s.gender === 'M' || s.gender === '男');
                    else if (reqStaff.includes('女') || reqStaff.includes('Female') || current.booking.isOil) candidates = candidates.filter(s => s.gender === 'F' || s.gender === '女');
                    
                    candidates.sort((a,b) => (statusData[a.id]?.checkInTime||0) - (statusData[b.id]?.checkInTime||0));
                    
                    if (candidates.length === 0) { alert("⚠️ No suitable staff available!"); return; }
                    finalStaffId = candidates[0].id;
                }

                const newStatusData = { ...statusData, [finalStaffId]: { ...statusData[finalStaffId], status: 'BUSY' } };
                updateStaffStatus(newStatusData); 
                
                const newBooking = { ...current.booking, staffId: finalStaffId };
                let comboMeta = current.comboMeta || null;
                if (comboSequence) {
                    const currentType = currentId.split('-')[0];
                    const index = currentId.split('-')[1];
                    let ghostTargetId = null;
                    const targetTypePrefix = currentType === 'chair' ? 'bed' : 'chair';
                    if (!resourceState[`${targetTypePrefix}-${index}`] && `${targetTypePrefix}-${index}` !== id) { 
                        ghostTargetId = `${targetTypePrefix}-${index}`; 
                    } else { 
                        for(let i=1; i<=6; i++) { 
                            const tid = `${targetTypePrefix}-${i}`; 
                            if(!resourceState[tid] && tid !== id) { ghostTargetId = tid; break; } 
                        } 
                    }
                    // Keep existing flex or default to 0
                    comboMeta = { sequence: comboSequence, targetId: ghostTargetId, flex: (current.comboMeta && current.comboMeta.flex) || 0 };
                }
                
                const newState = { ...resourceState };
                if (shouldMove) delete newState[id];
                newState[currentId] = { ...current, booking: newBooking, startTime: new Date().toISOString(), isRunning: true, comboMeta };
                updateResource(newState);
                axios.post('/api/update-booking-details', { rowId: current.booking.rowId, staffId: finalStaffId });
            };

            const confirmComboStart = (sequence) => { if (comboStartData) { executeStart(comboStartData.id, sequence); setComboStartData(null); } };
            const handleSwitch = (fromId, toType) => { const currentData = resourceState[fromId]; if(!currentData) return; for(let i=1; i<=6; i++) { const targetId = `${toType}-${i}`; if (!resourceState[targetId]) { const newState = { ...resourceState }; delete newState[fromId]; newState[targetId] = currentData; updateResource(newState); return; } } alert(`該區域 (${toType === 'chair' ? '足底區' : '身體區'}) 已無空位!`); };
            const handleToggleMax = async (resId) => { const res = resourceState[resId]; if (!res) return; updateResource({ ...resourceState, [resId]: { ...res, isMaxMode: !res.isMaxMode } }); };
            const handleToggleSequence = async (resId) => { const res = resourceState[resId]; if (!res || !res.comboMeta) return; const newSeq = res.comboMeta.sequence === 'FB' ? 'BF' : 'FB'; updateResource({ ...resourceState, [resId]: { ...res, comboMeta: { ...res.comboMeta, sequence: newSeq } } }); }
            
            const handleConfirmPayment = async (itemsToPay, totalAmount) => {
                try {
                    const uniqueRowIds = [...new Set(itemsToPay.map(i => i.booking.rowId))];
                    for (const rid of uniqueRowIds) { await axios.post('/api/update-status', { rowId: rid, status: '✅ 完成' }); }
                    const newState = { ...resourceState };
                    const newStatusData = { ...statusData }; 
                    const sortedItems = [...itemsToPay].sort((a, b) => {
                        const tA = newState[a.resourceId]?.startTime ? new Date(newState[a.resourceId].startTime).getTime() : 0;
                        const tB = newState[b.resourceId]?.startTime ? new Date(newState[b.resourceId].startTime).getTime() : 0;
                        return tA - tB;
                    });
                    const now = Date.now();
                    sortedItems.forEach((item, index) => {
                        const resId = item.resourceId; 
                        if (newState[resId]) {
                             const staffId = newState[resId].booking.staffId;
                             if(staffId !== '隨機' && newStatusData[staffId]) { 
                                 newStatusData[staffId] = { status: 'READY', checkInTime: now + (index * 100) }; 
                             }
                             delete newState[resId]; 
                        }
                    });
                    updateResource(newState);
                    updateStaffStatus(newStatusData); 
                    setBillingData(null);
                    alert(`✅ 結帳成功: $${totalAmount}`);
                    fetchData();
                } catch(e) { alert('結帳失敗!'); }
            };

            const handleWalkInSave = async (data) => { await axios.post('/api/admin-booking', data); setShowWalkIn(false); fetchData(); };
            const handleAssignBooking = (booking) => { if (!selectedSlot) return; updateResource({ ...resourceState, [selectedSlot]: { booking, startTime: null, isRunning: false } }); setSelectedSlot(null); };
            const handleManualUpdateStatus = async (rowId, status) => { if(confirm('確認更新狀態?')) { await axios.post('/api/update-status', { rowId, status }); fetchData(); } };

            const getStatus = (id) => statusData[id]?.status || 'AWAY';
            const getWeight = (id) => { const num = parseInt(id.replace(/\D/g, '')); return isNaN(num) ? 9000 + id.charCodeAt(0) : num; };
            const sortIdAsc = (a, b) => getWeight(a.id) - getWeight(b.id);
            const awayStaff = staffList.filter(s => { const st = getStatus(s.id); return st === 'AWAY' || st === 'OFF'; }).sort(sortIdAsc);
            const busyStaff = staffList.filter(s => getStatus(s.id) === 'BUSY').sort((a,b) => { const resA = Object.values(resourceState).find(r => r.booking.staffId === a.id); const resB = Object.values(resourceState).find(r => r.booking.staffId === b.id); const timeA = resA?.startTime ? new Date(resA.startTime).getTime() : 0; const timeB = resB?.startTime ? new Date(resB.startTime).getTime() : 0; return timeA !== timeB ? timeA - timeB : sortIdAsc(a, b); });
            const readyStaff = staffList.filter(s => { const st = getStatus(s.id); return st === 'READY' || st === 'EAT' || st === 'OUT_SHORT'; }).sort((a,b) => { const timeA = statusData[a.id]?.checkInTime || 0; const timeB = statusData[b.id]?.checkInTime || 0; return timeA !== timeB ? timeA - timeB : sortIdAsc(a, b); });
            const readyQueue = readyStaff.filter(s => getStatus(s.id) === 'READY').map(s => s.id);
            
            const todaysBookings = useMemo(() => {
                const safe = Array.isArray(bookings) ? bookings : [];
                return safe.filter(b => isWithinOperationalDay(b.startTimeString.split(' ')[0], b.startTimeString.split(' ')[1], viewDate));
            }, [bookings, viewDate]);

            const goPrevDay = () => { const d = new Date(viewDate); d.setDate(d.getDate()-1); setViewDate(d.toISOString().split('T')[0]); };
            const goNextDay = () => { const d = new Date(viewDate); d.setDate(d.getDate()+1); setViewDate(d.toISOString().split('T')[0]); };

            return (
                <div className="min-h-screen flex flex-col bg-slate-50">
                    <header className="bg-[#1e1b4b] text-white p-3 shadow-md flex justify-between items-center sticky top-0 z-50">
                        <div className="flex items-center gap-3"><span className="bg-amber-500 text-black px-2 py-1 rounded font-black text-sm">V231 (Smart Wiggle +/- 5m)</span><span className="font-bold hidden md:inline">XinWuChan</span><div className="flex items-center gap-2 bg-white/10 rounded px-2 py-1 border border-white/20"><button onClick={goPrevDay} className="text-white hover:text-amber-400 font-bold px-2">❮</button><input type="date" value={viewDate} onChange={(e) => setViewDate(e.target.value)} className="bg-transparent text-white font-bold outline-none cursor-pointer text-center" style={{colorScheme: 'dark'}} /><button onClick={goNextDay} className="text-white hover:text-amber-400 font-bold px-2">❯</button></div></div>
                        <div className="flex gap-2"><button onClick={()=>setShowWalkIn(true)} className="bg-amber-500 hover:bg-amber-400 text-black px-4 py-1.5 rounded font-bold text-sm flex gap-1 items-center"><i className="fas fa-bolt"></i> 快速接單</button><button onClick={()=>setShowCheckIn(true)} className="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-1.5 rounded font-bold text-sm flex gap-1 items-center"><i className="fas fa-user-clock"></i> 技師打卡</button></div>
                    </header>
                    <div className="bg-white border-b shadow-sm p-3 overflow-x-auto whitespace-nowrap staff-scroll"><div className="flex w-full justify-between items-center min-w-max"><div className="flex gap-2 opacity-30 scale-90 border-r-2 pr-4 mr-2 border-dashed border-slate-300">{awayStaff.map(s => <StaffCard3D key={s.id} s={s} statusData={statusData} resourceState={resourceState} />)}</div><div className="flex items-center flex-1 justify-end pl-4"><div className="flex flex-row-reverse gap-2 px-4 border-r border-red-100">{busyStaff.map(s => <StaffCard3D key={s.id} s={s} statusData={statusData} resourceState={resourceState} />)}</div><div className="flex flex-row-reverse gap-2 pl-4">{readyStaff.map((s, idx) => { const qIdx = readyQueue.indexOf(s.id); return <StaffCard3D key={s.id} s={s} statusData={statusData} resourceState={resourceState} queueIndex={qIdx !== -1 ? qIdx : undefined} />; })}</div></div></div></div>
                    <div className="p-4 flex gap-2"><button onClick={()=>setActiveTab('map')} className={`px-4 py-2 rounded font-bold flex gap-2 items-center ${activeTab==='map'?'bg-[#1e1b4b] text-white':'bg-white shadow'}`}><i className="fas fa-th"></i> 平面圖 (Map)</button><button onClick={()=>setActiveTab('list')} className={`px-4 py-2 rounded font-bold flex gap-2 items-center ${activeTab==='list'?'bg-[#1e1b4b] text-white':'bg-white shadow'}`}><i className="fas fa-list"></i> 列表 (List)</button><button onClick={()=>setActiveTab('timeline')} className={`px-4 py-2 rounded font-bold flex gap-2 items-center ${activeTab==='timeline'?'bg-[#1e1b4b] text-white':'bg-white shadow'}`}><i className="fas fa-stream"></i> 時間軸 (Timeline)</button><button onClick={()=>setActiveTab('report')} className={`px-4 py-2 rounded font-bold flex gap-2 items-center ${activeTab==='report'?'bg-[#1e1b4b] text-white':'bg-white shadow'}`}><i className="fas fa-chart-line"></i> 營業報告 (Report)</button></div>
                    <main className="flex-1 p-4 overflow-y-auto">
                        {activeTab === 'map' && (<div className="grid grid-cols-12 gap-6"><div className="col-span-9 space-y-6"><div><h3 className="font-bold text-emerald-600 mb-3 border-b pb-1">足底按摩區 (Foot)</h3><div className="grid grid-cols-6 gap-3">{[1,2,3,4,5,6].map(i => <ResourceCard key={`chair-${i}`} id={`chair-${i}`} type="FOOT" index={i} data={resourceState[`chair-${i}`]} busyStaffIds={busyStaffIds} staffList={staffList} onAction={handleResourceAction} onSelect={()=>setSelectedSlot(`chair-${i}`)} onSwitch={handleSwitch} onToggleMax={handleToggleMax} onToggleSequence={handleToggleSequence} onServiceChange={handleServiceChange} onStaffChange={handleStaffChange} />)}</div></div><div><h3 className="font-bold text-purple-600 mb-3 border-b pb-1">身體指壓區 (Body)</h3><div className="grid grid-cols-6 gap-3">{[1,2,3,4,5,6].map(i => <ResourceCard key={`bed-${i}`} id={`bed-${i}`} type="BODY" index={i} data={resourceState[`bed-${i}`]} busyStaffIds={busyStaffIds} staffList={staffList} onAction={handleResourceAction} onSelect={()=>setSelectedSlot(`bed-${i}`)} onSwitch={handleSwitch} onToggleMax={handleToggleMax} onToggleSequence={handleToggleSequence} onServiceChange={handleServiceChange} onStaffChange={handleStaffChange} />)}</div></div></div><div className="col-span-3 bg-white rounded-lg shadow p-4 h-fit sticky top-2"><h3 className="font-bold text-gray-700 mb-3">候位名單 (Waiting) ({todaysBookings.filter(b=>b.status==='已預約').length})</h3><div className="space-y-2 max-h-[500px] overflow-y-auto">{todaysBookings.filter(b=>b.status==='已預約').map(b => (<div key={b.rowId} className="border p-2 rounded hover:bg-slate-50 relative group bg-white shadow-sm"><div className="flex justify-between font-bold text-sm"><span>{b.customerName}</span><span className="text-indigo-600 font-mono">{b.startTimeString.split(' ')[1]}</span></div><div className="text-xs text-gray-500 font-bold">{b.serviceName}</div>{(b.isOil || (b.serviceName && b.serviceName.includes('油'))) && <div className="text-[10px] bg-purple-100 text-purple-700 inline-block px-1 rounded mt-1 font-bold border border-purple-200">💧 精油 (Oil)</div>}{b.pax > 1 && <div className="text-[10px] bg-orange-100 text-orange-600 inline-block px-1 rounded mt-1 ml-1 font-bold">{b.pax} 人</div>}{selectedSlot && <button onClick={()=>handleAssignBooking(b)} className="absolute inset-0 bg-green-500/90 text-white font-bold flex items-center justify-center rounded animate-pulse">排入 {selectedSlot}</button>}<button onClick={()=>handleManualUpdateStatus(b.rowId, '❌ Cancelled')} className="absolute top-1 right-1 text-gray-300 hover:text-red-500 opacity-0 group-hover:opacity-100"><i className="fas fa-trash"></i></button></div>))}</div></div></div>)}
                        {activeTab === 'list' && (<div className="bg-white rounded shadow overflow-hidden"><table className="w-full text-sm text-left"><thead className="bg-slate-100 text-slate-600 font-bold"><tr><th className="p-3">預約日期</th><th className="p-3">時間</th><th className="p-3">姓名</th><th className="p-3">項目</th><th className="p-3">油推</th><th className="p-3">人數</th><th className="p-3">電話</th><th className="p-3">狀態</th><th className="p-3">指定師傅</th><th className="p-3 text-right">操作</th></tr></thead><tbody className="divide-y">{todaysBookings.map(b => { const nameParts = b.customerName.split('('); const name = nameParts[0].trim(); const phone = nameParts.length > 1 ? nameParts[1].replace(')', '').trim() : (b.sdt || ''); const isOil = b.serviceName.includes('油') ? 'Yes' : ''; return ( <tr key={b.rowId} className="hover:bg-slate-50"><td className="p-3 font-mono">{b.startTimeString.split(' ')[0]}</td><td className="p-3 font-mono font-bold text-indigo-700">{b.startTimeString.split(' ')[1]}</td><td className="p-3 font-bold">{name}</td><td className="p-3 text-gray-600">{b.serviceName}</td><td className="p-3 text-center">{isOil && <span className="text-purple-600 font-bold">Yes</span>}</td><td className="p-3 text-center">{b.pax}</td><td className="p-3 font-mono text-gray-500">{phone}</td><td className="p-3"><span className={`px-2 py-1 rounded text-xs font-bold ${b.status.includes('取消')?'bg-red-100 text-red-600':'bg-green-100 text-green-600'}`}>{b.status}</span></td><td className="p-3"><span className="bg-indigo-50 text-indigo-700 px-2 py-1 rounded text-xs font-bold">{b.staffId}</span></td><td className="p-3 text-right"><button onClick={()=>handleManualUpdateStatus(b.rowId, '❌ Cancelled')} className="text-red-500 hover:bg-red-50 px-2 py-1 rounded"><i className="fas fa-trash"></i></button></td></tr> ); })}</tbody></table></div>)}
                        {activeTab === 'timeline' && <TimelineView bookings={todaysBookings} resourceState={resourceState} />}
                        {activeTab === 'report' && <ReportView bookings={todaysBookings} />}
                    </main>
                    {showWalkIn && <WalkInModal onClose={()=>setShowWalkIn(false)} onSave={handleWalkInSave} staffList={staffList} initialDate={viewDate} />}
                    {showCheckIn && <CheckInBoard staffList={staffList} statusData={statusData} onUpdateStatus={updateStaffStatus} onClose={()=>setShowCheckIn(false)} />}
                    {comboStartData && <ComboStartModal onConfirm={confirmComboStart} onCancel={()=>setComboStartData(null)} bookingName={comboStartData.booking.serviceName} />}
                    {selectedSlot && !bookings.find(b=>b.status==='已預約') && <div className="fixed inset-0 bg-black/30 z-50 flex items-center justify-center text-white font-bold" onClick={()=>setSelectedSlot(null)}>目前無候位! (No Waiting)</div>}
                    {billingData && <BillingModal activeItem={billingData.activeItem} relatedItems={billingData.relatedItems} onConfirm={handleConfirmPayment} onCancel={() => setBillingData(null)} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
