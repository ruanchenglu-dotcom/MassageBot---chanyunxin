<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XinWuChan POS - Full Dashboard</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.6.7/axios.min.js"></script>

    <style>
        body { font-family: 'Microsoft JhengHei', sans-serif; background-color: #eef2f6; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .card-shadow { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); }
        /* Màu sắc trạng thái thợ */
        .staff-ready { background-color: #10B981; color: white; } /* Xanh lá */
        .staff-working { background-color: #EF4444; color: white; animation: pulse-border 2s infinite; } /* Đỏ */
        .staff-break { background-color: #F59E0B; color: white; } /* Vàng */
        .staff-off { background-color: #9CA3AF; color: white; opacity: 0.7; } /* Xám */
        
        /* Viền giới tính */
        .gender-female { border-left: 5px solid #F472B6; } /* Hồng */
        .gender-male { border-left: 5px solid #3B82F6; }   /* Xanh dương */

        @keyframes pulse-border { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 6px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // ICON SVG (Tự vẽ để không lỗi)
        const Icon = ({ path, size=20, className="" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{path}</svg>
        );
        const ICONS = {
            Users: <><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>,
            Armchair: <><path d="M19 9V6a2 2 0 0 0-2-2H7a2 2 0 0 0-2 2v3"/><path d="M3 16a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-5a2 2 0 0 0-4 0v2H7v-2a2 2 0 0 0-4 0Z"/><path d="M5 18v2"/><path d="M19 18v2"/></>,
            Bed: <><path d="M2 4v16"/><path d="M2 8h18a2 2 0 0 1 2 2v10"/><path d="M2 17h20"/><path d="M6 8v9"/></>,
            Refresh: <><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></>,
            Plus: <><path d="M5 12h14"/><path d="M12 5v14"/></>,
            Clock: <><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>,
            User: <><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></>,
            Close: <><path d="M18 6 6 18"/><path d="m6 6 12 12"/></>
        };

        // CẤU HÌNH
        const RESOURCES = {
            chair: Array.from({ length: 6 }, (_, i) => ({ id: `chair_${i + 1}`, name: `Foot ${i + 1}` })),
            bed: Array.from({ length: 6 }, (_, i) => ({ id: `bed_${i + 1}`, name: `Body ${i + 1}` })),
        };
        const SERVICES = [
            { id: 'FT_60', name: '👣 足底按摩 (60分)' },
            { id: 'BD_60', name: '🛏️ 全身指壓 (60分)' },
            { id: 'CB_100', name: '🔥 招牌套餐 (100分)' }
        ];

        const formatTime = (date) => date ? date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false }) : '--:--';
        const parseDate114 = (str) => {
            if (!str) return new Date();
            try { const [d, t] = str.split(' '); const [y, m, day] = d.split('/'); const [hh, mm] = t.split(':'); return new Date(parseInt(y)+1911, parseInt(m)-1, parseInt(day), parseInt(hh), parseInt(mm)); } catch (e) { return new Date(); }
        };

        // --- APP ---
        function App() {
            const [bookings, setBookings] = useState([]);
            const [staffList, setStaffList] = useState([]);
            const [loading, setLoading] = useState(true);
            const [currentTime, setCurrentTime] = useState(new Date());
            const [actionModal, setActionModal] = useState(null);
            const [isAddModalOpen, setIsAddModalOpen] = useState(false);
            const [form, setForm] = useState({ name: '', phone: '', serviceId: 'FT_60', time: '14:00', pax: 1 });

            const fetchData = async () => {
                try {
                    const res = await axios.get('/api/info');
                    const { bookings: apiBookings, staffList: apiStaff, schedule } = res.data;
                    
                    const now = new Date();
                    const mappedBookings = apiBookings.map((b, idx) => {
                        const start = parseDate114(b.startTimeString);
                        const end = new Date(start.getTime() + b.duration * 60000);
                        // Tự động gán ghế/giường để hiển thị
                        let resId = b.serviceName.includes('足') ? `chair_${(idx % 6) + 1}` : `bed_${(idx % 6) + 1}`;
                        return { ...b, id: idx, startTimeFull: start, endTimeFull: end, status: (now >= start && now <= end) ? 'active' : 'scheduled', resourceId: resId };
                    });
                    setBookings(mappedBookings);

                    const mappedStaff = apiStaff.map(s => {
                        const currentJob = mappedBookings.find(b => b.staffId === s.id && b.status === 'active');
                        const isOff = schedule.some(sch => sch.staffId === s.id); // Cần logic check ngày chuẩn hơn ở BE
                        let status = 'ready';
                        if (isOff) status = 'off';
                        if (currentJob) status = currentJob.customerName === 'Staff Action' ? 'break' : 'working';
                        return { ...s, status, currentJob };
                    });
                    
                    // Sort: Ready lên đầu
                    mappedStaff.sort((a, b) => {
                        const score = { 'ready': 1, 'working': 2, 'break': 3, 'off': 4 };
                        return score[a.status] - score[b.status];
                    });
                    
                    setStaffList(mappedStaff);
                    setLoading(false);
                } catch (err) { console.error(err); }
            };

            useEffect(() => { fetchData(); const i = setInterval(fetchData, 10000); return () => clearInterval(i); }, []);

            const handleStaffAction = async (action, duration) => {
                if(!actionModal) return; setLoading(true);
                try { await axios.post('/api/admin-staff-action', { staffId: actionModal.id, action, duration }); setActionModal(null); fetchData(); } catch(e) { alert("Lỗi!"); } setLoading(false);
            };
            
            const handleAddBooking = async () => {
                 if(!form.name) return alert("Nhập tên!");
                 setLoading(true);
                 try { 
                     const svc = SERVICES.find(s=>s.id===form.serviceId);
                     await axios.post('/api/admin-booking', { ngayDen: new Date().toISOString().split('T')[0], gioDen: form.time, dichVu: svc.name, nhanVien: '隨機', sdt: form.phone, hoTen: form.name, pax: form.pax });
                     setIsAddModalOpen(false); fetchData();
                 } catch(e){ alert("Error"); } setLoading(false);
            };

            // --- UI COMPONENTS ---

            const StaffCard = ({ s }) => {
                const isFemale = (s.gender === 'F' || s.gender === '女');
                let statusText = "Sẵn sàng (Ready)";
                let statusClass = "staff-ready";
                
                if (s.status === 'working') { statusText = `Bận: ${s.currentJob?.customerName}`; statusClass = "staff-working"; }
                if (s.status === 'break') { statusText = `Nghỉ: ${s.currentJob?.dichVu}`; statusClass = "staff-break"; }
                if (s.status === 'off') { statusText = "Nghỉ phép (OFF)"; statusClass = "staff-off"; }

                return (
                    <div onClick={() => setActionModal(s)} className={`p-3 mb-2 rounded-lg shadow-sm cursor-pointer flex items-center justify-between transition hover:scale-[1.02] bg-white ${isFemale ? 'gender-female' : 'gender-male'}`}>
                        <div className="flex items-center gap-3">
                            <div className={`w-10 h-10 rounded-full flex items-center justify-center font-bold text-lg ${statusClass}`}>
                                {s.name.replace('號','')}
                            </div>
                            <div>
                                <div className="font-bold text-slate-800 text-lg">{s.name}</div>
                                <div className="text-xs text-slate-500 font-bold">{isFemale ? 'Nữ (F)' : 'Nam (M)'}</div>
                            </div>
                        </div>
                        <div className={`text-[10px] font-bold px-2 py-1 rounded text-white ${statusClass}`}>
                            {s.status === 'working' ? 'ĐANG LÀM' : s.status === 'ready' ? 'RẢNH' : 'NGHỈ'}
                        </div>
                    </div>
                );
            };

            const ResourceCard = ({ res, icon }) => {
                const active = bookings.find(b => b.resourceId === res.id && b.status === 'active');
                return (
                    <div className={`p-3 rounded-xl border-2 min-h-[120px] flex flex-col justify-between relative shadow-sm transition ${active ? 'bg-red-50 border-red-400' : 'bg-white border-slate-200'}`}>
                        <div className="flex justify-between">
                            <span className="font-bold text-slate-600">{res.name}</span>
                            {active && <span className="animate-pulse w-3 h-3 bg-red-500 rounded-full"></span>}
                        </div>
                        
                        {active ? (
                            <div className="mt-2">
                                <div className="font-bold text-slate-800 flex items-center gap-1"><Icon path={ICONS.User} size={14}/> {active.customerName}</div>
                                <div className="text-xs text-slate-600 mt-1">{active.serviceName.split('(')[0]}</div>
                                <div className="mt-2 flex justify-between items-center border-t border-red-200 pt-1">
                                    <span className="font-bold text-red-700 bg-red-100 px-1 rounded text-xs">{active.staffId}</span>
                                    <span className="text-xs font-mono font-bold flex items-center gap-1"><Icon path={ICONS.Clock} size={12}/> {formatTime(active.endTimeFull)}</span>
                                </div>
                            </div>
                        ) : (
                            <div className="flex flex-col items-center justify-center h-full text-slate-300">
                                {icon}
                                <span className="text-xs font-bold mt-1">TRỐNG</span>
                            </div>
                        )}
                    </div>
                )
            };

            return (
                <div className="flex flex-col h-screen">
                    <header className="bg-slate-800 text-white p-4 shadow-lg flex justify-between items-center z-50">
                        <h1 className="font-bold text-xl tracking-wide">💆 XinWuChan Center</h1>
                        <div className="flex gap-3">
                            <button onClick={fetchData} className="bg-slate-600 p-2 rounded-full hover:bg-slate-500 transition"><Icon path={ICONS.Refresh}/></button>
                            <button onClick={()=>setIsAddModalOpen(true)} className="bg-emerald-500 text-white px-4 py-2 rounded-lg font-bold shadow-lg hover:bg-emerald-400 flex items-center gap-2">
                                <Icon path={ICONS.Plus}/> Thêm Khách
                            </button>
                        </div>
                    </header>

                    <div className="flex-1 flex overflow-hidden bg-slate-100 p-4 gap-6">
                        
                        {/* CỘT TRÁI: DANH SÁCH THỢ */}
                        <aside className="w-1/4 min-w-[250px] bg-white rounded-2xl shadow-md flex flex-col overflow-hidden border border-slate-200">
                            <div className="p-4 border-b bg-slate-50 font-bold text-slate-600 flex justify-between items-center">
                                <span>👥 Danh sách Thợ</span>
                                <span className="bg-green-100 text-green-800 text-xs px-2 py-1 rounded-full">{staffList.filter(s=>s.status==='ready').length} Ready</span>
                            </div>
                            <div className="flex-1 overflow-y-auto p-3 bg-slate-50/50">
                                {staffList.map(s => <StaffCard key={s.id} s={s} />)}
                            </div>
                        </aside>

                        {/* CỘT PHẢI: SƠ ĐỒ GHẾ & GIƯỜNG */}
                        <main className="flex-1 overflow-y-auto pr-2 space-y-6">
                            
                            {/* Khu vực Ghế */}
                            <section>
                                <h3 className="font-bold text-slate-700 mb-3 text-lg flex items-center gap-2"><Icon path={ICONS.Armchair}/> Khu Vực Chân (Foot Massage)</h3>
                                <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-6 gap-4">
                                    {RESOURCES.chair.map(r => <ResourceCard key={r.id} res={r} icon={<Icon path={ICONS.Armchair} size={32}/>}/>)}
                                </div>
                            </section>

                            {/* Khu vực Giường */}
                            <section>
                                <h3 className="font-bold text-slate-700 mb-3 text-lg flex items-center gap-2"><Icon path={ICONS.Bed}/> Khu Vực Body (Body Massage)</h3>
                                <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-6 gap-4">
                                    {RESOURCES.bed.map(r => <ResourceCard key={r.id} res={r} icon={<Icon path={ICONS.Bed} size={32}/>}/>)}
                                </div>
                            </section>

                        </main>
                    </div>

                    {/* MODAL THAO TÁC THỢ */}
                    {actionModal && (
                        <div className="fixed inset-0 bg-black/60 z-[60] flex items-center justify-center p-4">
                            <div className="bg-white rounded-xl w-80 p-6 shadow-2xl text-center animate-in fade-in zoom-in duration-200">
                                <h3 className="text-xl font-bold mb-1 text-slate-800">{actionModal.name}</h3>
                                <p className="text-sm text-slate-500 mb-6">{actionModal.status === 'ready' ? 'Đang rảnh' : 'Đang bận'}</p>
                                <div className="space-y-3">
                                    <button onClick={()=>handleStaffAction('break', 30)} className="w-full py-3 bg-yellow-100 text-yellow-800 rounded-lg font-bold hover:bg-yellow-200">🍱 Đi ăn (30p)</button>
                                    <button onClick={()=>handleStaffAction('leave', 0)} className="w-full py-3 bg-red-100 text-red-800 rounded-lg font-bold hover:bg-red-200">🏠 Về sớm / Nghỉ</button>
                                    <button onClick={()=>setActionModal(null)} className="w-full py-3 bg-gray-100 text-gray-600 rounded-lg font-bold hover:bg-gray-200 mt-2">Đóng</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL THÊM KHÁCH */}
                    {isAddModalOpen && (
                         <div className="fixed inset-0 bg-black/60 z-[60] flex items-center justify-center p-4">
                            <div className="bg-white rounded-xl w-96 p-6 shadow-2xl">
                                <div className="flex justify-between mb-4"><h3 className="font-bold text-lg">Thêm Khách Tại Quầy</h3><button onClick={()=>setIsAddModalOpen(false)}><Icon path={ICONS.Close}/></button></div>
                                <div className="space-y-3">
                                    <input className="border w-full p-2 rounded" placeholder="Tên Khách" value={form.name} onChange={e=>setForm({...form, name:e.target.value})}/>
                                    <input className="border w-full p-2 rounded" placeholder="SĐT" value={form.phone} onChange={e=>setForm({...form, phone:e.target.value})}/>
                                    <select className="border w-full p-2 rounded" value={form.serviceId} onChange={e=>setForm({...form, serviceId:e.target.value})}>{SERVICES.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}</select>
                                    <div className="flex gap-2">
                                        <input type="time" className="border w-full p-2 rounded" value={form.time} onChange={e=>setForm({...form, time:e.target.value})}/>
                                        <select className="border w-full p-2 rounded" value={form.pax} onChange={e=>setForm({...form, pax:e.target.value})}>{[1,2,3,4].map(n=><option value={n}>{n} khách</option>)}</select>
                                    </div>
                                    <button onClick={handleAddBooking} disabled={loading} className="w-full bg-emerald-600 text-white py-3 rounded font-bold shadow mt-2">{loading?'Đang lưu...':'Xác nhận'}</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
