<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>MassageBot - Bed Display</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

    <!-- Axios for API calls -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <link rel="stylesheet" href="style.css">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        darkbg: '#0f172a',
                        darkpanel: '#1e293b',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-darkbg text-white overflow-hidden select-none">
    
    <!-- Portrait Warning -->
    <div id="portrait-warning" class="fixed inset-0 bg-red-600 z-50 flex flex-col items-center justify-center text-center p-6 text-white hidden">
        <i class="fas fa-mobile-alt text-6xl mb-4 animate-bounce" style="transform: rotate(90deg);"></i>
        <h2 class="text-3xl font-bold mb-2">請將手機橫向放置</h2>
        <p class="text-xl">此介面僅在橫向模式下運作。</p>
    </div>

    <!-- React App Root -->
    <div id="root" class="w-screen h-screen"></div>

    <script type="text/babel" src="app.jsx"></script>
</body>
</html>
